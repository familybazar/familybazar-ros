async function invOpen(id){try{invoiceOpen=await(await fetch('/api/invoices/get?id='+encodeURIComponent(id))).json();invPickIdx=null;render();}catch(e){toast('Could not open invoice');}}
async function invMatch(id){toast('Matching against your catalog…');try{const d=await(await fetch('/api/invoices/match',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id})})).json();if(d.error)throw new Error(d.error);invoiceOpen=d;render();const s=d.matchStats||{};toast(`Matched ${s.matched||0} of ${s.total||0}${s.unmatched?` · ${s.unmatched} new`:''}`);}catch(e){toast('Match failed: '+e.message);}}
async function invPost(id){const held=(invoiceOpen&&invoiceOpen.matchStats&&invoiceOpen.matchStats.unmatched)||0;if(!confirm(held?`Post this delivery into inventory?\n\n${held} line(s) have no product match and will be HELD.`:'Post this delivery into inventory?\n\nStock and costs will be updated.'))return;toast('Posting to inventory…');try{const d=await(await fetch('/api/invoices/post',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id})})).json();if(d.error)throw new Error(d.error);invoiceOpen=d;await invLoadList();await load();render();const s=d.postStats||{};toast(`Posted ${s.posted||0} lines · ${s.unitsIn||0} units${s.held?` · ${s.held} held`:''}`);}catch(e){toast('Posting failed: '+e.message);}}
async function invVoid(id){if(!confirm('Undo this posting?\n\nEvery posted line gets a reversing entry. Stock returns to what it was.'))return;toast('Reversing…');try{const d=await(await fetch('/api/invoices/void',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id})})).json();if(d.error)throw new Error(d.error);invoiceOpen=d;await invLoadList();await load();render();toast(`Reversed ${d.reversed||0} lines`);}catch(e){toast('Undo failed: '+e.message);}}
function invPick(i){const lines=((invoiceOpen&&invoiceOpen.extracted)||{}).lines||[];const l=lines[i]||{};const q=prompt('Search your catalog for this line:',String(l.description||'').slice(0,40));if(q===null)return;invPickIdx=i;invPickQ=String(q||'').trim().toLowerCase();render();}
async function invPickSet(i,pid){try{const d=await(await fetch('/api/invoices/line-match',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:invoiceOpen.id,index:i,productId:pid})})).json();if(d.error)throw new Error(d.error);invoiceOpen=d;invPickIdx=null;invPickQ='';render();toast(pid?'Matched - remembered for this supplier':'Marked as new product');}catch(e){toast('Could not save match');}}
function invMatchCell(l,i){
  if(invPickIdx===i){const q=invPickQ;const list=q?(S.products||[]).filter(p=>((p.displayName||p.name||'')+' '+(p.brand||'')+' '+(p.barcode||'')+' '+(p.sku||'')).toLowerCase().includes(q)).slice(0,8):[];
    return `<td style="min-width:230px"><div class="sub" style="font-size:11px">Results for "${esc(q)}"</div>${list.length?list.map(p=>`<button class="btn sec sm" style="display:block;width:100%;text-align:left;margin:2px 0" onclick="invPickSet(${i},'${esc(String(p.id))}')">${esc(p.displayName||p.name||'')}</button>`).join(''):'<div class="sub" style="font-size:11px">No catalog matches - leave as new.</div>'}<button class="btn sec sm" onclick="invPick(${i})">Search again</button> <button class="btn sec sm" onclick="invPickSet(${i},'')">New product</button> <button class="btn sec sm" onclick="invPickIdx=null;render()">Cancel</button></td>`;}
  const m=l.match;
  if(!m)return `<td><span class="pill low">New product</span> <button class="btn sec sm" onclick="invPick(${i})">Pick</button></td>`;
  const tone=m.score>=0.92?'in':(m.score>=0.7?'low':'out');
  return `<td style="min-width:180px"><div style="font-weight:600;font-size:12.5px">${esc(m.name||'-')}</div><span class="pill ${tone}" title="${esc(m.method||'')}">${esc(INV_METHOD[m.method]||m.method||'')} ${Math.round((m.score||0)*100)}%</span> <button class="btn sec sm" onclick="invPick(${i})">Change</button></td>`;
}
function invDetail(){
  const r=invoiceOpen;if(!r||r.error)return '';
  const inv=(r.extracted&&r.extracted.invoice)||{};const lines=(r.extracted&&r.extracted.lines)||[];
  const canReview=(r.status==='needs_review'||r.status==='reviewed'||r.status==='partially_posted');
  const kpi=(v,l,c)=>`<div class="kpi"><div class="t">${l}</div><div class="v" style="font-size:18px${c?';color:'+c:''}">${v}</div></div>`;
  const ex=r.extracted||{};let addUp='';
  if(ex.computedTotal!=null){const g=Number(ex.goodsTotal)||Number(inv.total)||0;const ok=!g||Math.abs(ex.computedTotal-g)<=Math.max(1,g*0.02);addUp=kpi('$'+Number(ex.computedTotal).toFixed(2),'Lines add up '+(ok?'✓':'⚠'),ok?'#15803d':'#b91c1c');}
  const lineCountOk=!ex.lineCount||ex.lineCount===lines.length;
  return `<div class="card" style="margin-top:16px"><div class="bd">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><b>🧾 ${esc(r.id)} - ${esc(inv.supplier||r.supplier||'Supplier')}</b><a class="sub" style="cursor:pointer;color:var(--blue);font-weight:700" onclick="invoiceOpen=null;render()">Close</a></div>
    ${(r.status==='uploaded'||r.status==='processing')?`<div class="sub" style="margin-top:8px">Not extracted yet. <button class="btn sec sm" onclick="invExtract('${esc(r.id)}')">Run extraction</button></div>`:''}
    ${r.status==='failed'?`<div class="sub" style="margin-top:8px;color:#b91c1c">Extraction failed: ${esc(r.error||'')}. <button class="btn sec sm" onclick="invExtract('${esc(r.id)}')">Retry</button></div>`:''}
    ${canReview?`<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="btn" onclick="invPost('${esc(r.id)}')">✓ Approve &amp; post to inventory</button>
      <button class="btn sec" onclick="invMatch('${esc(r.id)}')">Match products</button>
      <button class="btn sec" onclick="invExtract('${esc(r.id)}')">Re-run extraction</button>
      ${r.matchStats?`<span class="pill ${r.matchStats.unmatched?'low':'in'}">${r.matchStats.matched} of ${r.matchStats.total} matched${r.matchStats.unmatched?` · ${r.matchStats.unmatched} new`:''}</span>`:''}
    </div>`:''}
    ${(r.status==='posted'||r.status==='partially_posted')?`<div style="margin-top:8px"><button class="btn sec sm" onclick="invVoid('${esc(r.id)}')">Undo posting</button></div>`:''}
    ${r.postStats?`<div class="card" style="background:#f0fdf4;border-color:#86efac;margin-top:10px"><div class="bd"><b>Posted:</b> ${r.postStats.posted} lines · <b>${r.postStats.unitsIn}</b> units · $${Number(r.postStats.postedValue||0).toFixed(2)}${r.postStats.created?` · <span style="color:#1d4ed8"><b>${r.postStats.created} new product(s)</b> created</span>`:''}${r.postStats.held?` · <span style="color:#b45309"><b>${r.postStats.held} held</b></span>`:''}</div></div>`:''}
    ${(r.warnings||[]).length?`<div class="card" style="background:#fffbeb;border-color:#fde68a;margin-top:10px"><div class="bd"><b>Please review:</b><ul style="margin:6px 0 0 18px">${(r.warnings||[]).map(w=>`<li>${esc(w)}</li>`).join('')}</ul></div>`:''}
    <div class="kpis" style="margin-top:12px">${kpi(esc(inv.invoiceNumber||'-'),'Invoice #')}${kpi(esc(inv.invoiceDate||'-'),'Date')}${kpi(inv.total!=null?'$'+Number(inv.total).toFixed(2):'-','Invoice total')}${addUp}${kpi(lines.length+(ex.lineCount&&!lineCountOk?' of '+ex.lineCount:''),'Line items '+(lineCountOk?'':'⚠'),lineCountOk?'':'#b91c1c')}</div>
    ${lines.length?`<div style="overflow:auto;margin-top:12px"><table><thead><tr><th>Description</th><th>Item no</th><th>Pack</th><th>Cases</th><th class="right">Case cost</th><th class="right">Line total</th><th>Units in</th><th>Matched product</th><th>Conf.</th></tr></thead><tbody>
      ${lines.map((l,li)=>`<tr>
        <td style="font-weight:600">${esc(l.description||'-')}${l.handwritten?' <span class="pill low" title="handwritten">✍</span>':''}</td>
        <td class="sub" style="font-size:12px">${esc(l.upc||l.sku||'')}</td>
        <td>${l.casePack!=null?esc(l.casePack):'-'}</td>
        <td>${l.qty!=null?esc(l.qty):'-'}</td>
        <td class="right">${l.unitCost!=null?'$'+Number(l.unitCost).toFixed(2):'-'}${(Number(l.casePack)>1&&l.unitCost!=null)?`<div class="sub" style="font-size:11px">$${(Number(l.unitCost)/Number(l.casePack)).toFixed(3)}/ea</div>`:''}</td>
        <td class="right">${l.lineTotal!=null?'$'+Number(l.lineTotal).toFixed(2):'-'}</td>
        <td style="font-weight:700">${(l.qty!=null&&Number(l.casePack)>0)?esc(Number(l.qty)*Number(l.casePack)):(l.qty!=null?esc(l.qty):'-')}${l.posted?(l.createdNew?' <span class="pill in">✓ new</span>':' <span class="pill in">✓</span>'):(l.holdReason?` <span class="pill low" title="${esc(l.holdReason)}">held</span>`:'')}</td>
        ${invMatchCell(l,li)}
        <td><span class="pill ${invConf(l.confidence)}">${Math.round((Number(l.confidence)||0)*100)}%</span></td>
      </tr>`).join('')}
    </tbody></table></div>`:''}
  </div></div>`;
}
function viewReceiving(){
  if(invoiceList===null){if(!invoiceLoading)invLoadList();return loadingScreen('Receiving');}
  const rows=invoiceList.length?invoiceList.map(r=>`<tr>
      <td style="font-weight:700;font-size:12px">${esc(r.id)}</td><td>${esc(r.supplier||'-')}</td><td>${r.lines||0}</td>
      <td class="right">${r.total!=null?'$'+Number(r.total).toFixed(2):'-'}</td>
      <td><span class="pill ${invBadge(r.status)}">${esc((r.status||'').replace('_',' '))}</span>${r.warnings?` <span class="pill low">${r.warnings}⚠</span>`:''}</td>
      <td class="right"><button class="btn sec sm" onclick="invOpen('${esc(r.id)}')">Open</button></td>
    </tr>`).join(''):`<tr><td colspan="6" class="sub" style="padding:20px">No invoices yet. Upload a supplier invoice (PDF or photo) to receive stock.</td></tr>`;
  return `<h1 class="hello">Receiving <small>supplier invoices → inventory</small></h1>
   <div class="card"><div class="bd">
     <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end">
       <div><label class="sub" style="display:block;margin-bottom:4px">Supplier (optional)</label><input id="invSupplier" placeholder="e.g. Dewan Wholesale" style="padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px"></div>
       <div><label class="sub" style="display:block;margin-bottom:4px">Invoice files (PDF or photo)</label><input id="invFiles" type="file" accept="image/*,application/pdf" multiple style="font-size:13px"></div>
       <button class="btn" id="invUploadBtn" onclick="invUpload()">Upload &amp; extract</button>
     </div>
     <div class="sub" style="font-size:12px;margin-top:8px">The invoice is read automatically. Review the lines, match any new products, then approve to post stock with case-pack math.</div>
   </div></div>
   <div class="card" style="margin-top:16px"><div class="bd" style="padding:2px 14px"><div style="overflow:auto"><table><thead><tr><th>Invoice</th><th>Supplier</th><th>Lines</th><th class="right">Total</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div></div>
   ${invDetail()}`;
}

function render(){
  const _af=document.activeElement;const _afId=_af&&_af.id;let _afPos=null;try{_afPos=_af&&_af.selectionStart;}catch(e){}
  const nav=NAV.filter(([k])=> role==='employee' ? ['overview','products','inventory','receiving','fulfillment','catalog'].includes(k) : true);
  const app=document.getElementById('app');
  app.innerHTML=`
   <aside class="side${navOpen?' open':''}">
     <div class="brand"><div class="logo">FB</div><div><b>Family Bazar</b><br><span>RETAIL OS</span></div></div>
     <nav class="nav">
       ${nav.map(([k,name,i])=>`<a class="${active===k?'active':''}" onclick="go('${k}')">${ic(i)}<span>${name}</span>${k==='operations'&&S.requests&&S.requests.filter(r=>r.status==='Open').length?`<span class="badge">${S.requests.filter(r=>r.status==='Open').length}</span>`:''}</a>`).join('')}
       <div class="lbl">OTHER SCREENS</div>
       <a onclick="window.location.href='/classic'">${ic('mobile')}<span>Old layout →</span></a>
     </nav>
     <div class="userbox">
       <div class="av">${(ME&&ME.name?ME.name:'?').slice(0,2).toUpperCase()}</div>
       <div style="flex:1;min-width:0"><div class="nm">${esc(ME&&ME.name?ME.name:'-')}</div><div class="rl" style="text-transform:capitalize">${esc(ME&&ME.role?ME.role:'')}</div></div>
       ${AUTH_ON?`<button onclick="logout()" title="Sign out" style="border:0;background:#f6f7f9;border-radius:8px;padding:6px 9px;font-size:12px;font-weight:700;color:#5b6270;cursor:pointer">Sign out</button>`:''}
     </div>
   </aside>
   <div class="navoverlay${navOpen?' show':''}" onclick="navOpen=false;render()"></div>
   <div class="main">
     <div class="topbar">
       <button class="hamb" aria-label="Menu" onclick="navOpen=!navOpen;render()">${ic('menu',22)}</button>
       <div class="search">${ic('search',17)}<input placeholder="Search product, barcode, SKU, brand, or shelf…" value="${esc(pSearch)}" onkeydown="if(event.key==='Enter')topSearch(this.value)"></div>
       <div class="synced" id="syncwrap" onclick="manualSync()" title="Click to refresh now" style="cursor:pointer"><span class="dot"></span><span id="syncind">${syncText()}</span></div>
       ${role!=='employee'?mfBellHtml():''}
       ${ME&&ME.role==='owner'?`<div class="roleseg" title="Preview the layout each role sees. Your owner permissions are unchanged.">
         <button class="${role==='owner'?'on':''}" onclick="setRole('owner')">Owner</button>
         <button class="${role==='manager'?'on':''}" onclick="setRole('manager')">Manager</button>
         <button class="${role==='employee'?'on':''}" onclick="setRole('employee')">Employee</button>
       </div>`:''}
     </div>
     <div class="content">${detailId?viewProductDetail(detailId):active==='overview'?viewOverview():active==='products'?viewProducts():active==='catalog'?viewCatalog():active==='inventory'?viewInventory():active==='receiving'?viewReceiving():active==='fulfillment'?viewFulfillment():active==='sales'?viewSales():active==='finance'?viewFinance():active==='cashentry'?viewCashEntry():active==='recurring'?viewRecurring():active==='customers'?viewCustomers():active==='operations'?viewOperations():active==='channels'?viewChannels():active==='marketing'?viewMarketing():active==='integrations'?viewIntegrations():active==='reports'?viewReports():active==='ai'?viewAI():viewPlaceholder(active,(NAV.find(n=>n[0]===active)||[,'Screen'])[1])}</div>
   </div>
   ${tabbarHtml()}`;
  if(_afId){const el=document.getElementById(_afId);if(el&&typeof el.focus==='function'){try{el.focus();if(_afPos!=null&&el.setSelectionRange)el.setSelectionRange(_afPos,_afPos);}catch(e){}}}
  if(active==='cashentry'){ try{ mfRecalc(); }catch(e){} }   // populate live summaries after the DOM is built
  try{ labelizeTables(); }catch(e){}                          // phone: label table cells for the card layout
}

(async()=>{
  // Establish the real logged-in user before anything renders. Server also redirects, this is the belt.
  try{ const meR = await fetch('/api/auth/me'); const meD = await meR.json();
       AUTH_ON = !!meD.authEnabled;
       if(AUTH_ON && !meD.user){ location.href='/login.html'; return; }   // only redirect when auth is enforced
       ME = meD.user || {name:'Guest', role:'owner'};
       role = (ME.role==='staff') ? 'employee' : ME.role;                 // map server 'staff' → UI 'employee'
  }catch(e){ if(AUTH_ON){ location.href='/login.html'; return; } }
  await load(); render();
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal()});
  document.addEventListener('click',()=>{ if(mfBellOpen){ mfBellOpen=false; render(); } });
  // Auto-sync: quietly refresh from the server so the dashboard stays live as NRS/Clover data lands.
  setInterval(async()=>{
    if(document.getElementById('mbg').classList.contains('show'))return;      // a dialog is open
    const a=document.activeElement;const tag=a&&a.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;                  // user is typing/choosing
    if(document.hidden)return;                                                  // tab not visible
    await load();render();
  }, 45000);
  // Keep the "synced Xs ago" label ticking between refreshes (no full re-render).
  setInterval(()=>{const el=document.getElementById('syncind');if(el)el.textContent=syncText();}, 10000);
})();
</script>
<script>
/* ============ PWA: install + offline + push (self-contained, survives app re-renders) ============ */
(function(){
  if(!('serviceWorker' in navigator)) return;
  var deferredPrompt=null;

  navigator.serviceWorker.register('/sw.js').catch(function(e){ console.warn('SW register failed',e); });

  // Floating action bar (lives outside #app so render() never wipes it).
  var bar=document.createElement('div');
  bar.id='pwabar';
  bar.style.cssText='position:fixed;right:16px;bottom:16px;z-index:9999;display:flex;flex-direction:column;gap:10px;align-items:flex-end';
  document.body.appendChild(bar);
  function mkBtn(label,bg){ var b=document.createElement('button'); b.textContent=label;
    b.style.cssText='border:0;border-radius:12px;padding:11px 16px;font:700 13.5px system-ui,-apple-system,Segoe UI,sans-serif;color:#fff;background:'+bg+';box-shadow:0 6px 20px rgba(10,37,64,.28);cursor:pointer;display:none';
    bar.appendChild(b); return b; }
  var installBtn=mkBtn('Install app','#123B8F');
  var alertBtn  =mkBtn('Turn on alerts','#0A2540');
  var testBtn   =mkBtn('Send test alert','#1E8A3C');

  // ---- Install ----
  var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
  window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt=e; if(!standalone) installBtn.style.display='block'; });
  installBtn.addEventListener('click', async function(){
    if(!deferredPrompt) return; installBtn.style.display='none';
    deferredPrompt.prompt(); try{ await deferredPrompt.userChoice; }catch(e){} deferredPrompt=null;
  });
  window.addEventListener('appinstalled', function(){ installBtn.style.display='none'; });

  // ---- Push ----
  function b64ToU8(base64){ var pad='='.repeat((4-base64.length%4)%4); var s=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
    var raw=atob(s); var out=new Uint8Array(raw.length); for(var i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i); return out; }
  var pushOk = ('PushManager' in window) && ('Notification' in window);
  async function subscribePush(){
    var reg=await navigator.serviceWorker.ready;
    var vr=await fetch('/api/push/vapid'); var vd=await vr.json();
    if(!vd || !vd.key){ alert('Push is not configured on the server yet.'); return false; }
    var existing=await reg.pushManager.getSubscription();
    var sub=existing || await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:b64ToU8(vd.key) });
    await fetch('/api/push/subscribe',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(sub) });
    return true;
  }
  if(pushOk){
    if(Notification.permission==='default') alertBtn.style.display='block';
    else if(Notification.permission==='granted'){ subscribePush().then(function(ok){ if(ok) testBtn.style.display='block'; }).catch(function(){}); }
  }
  alertBtn.addEventListener('click', async function(){
    alertBtn.style.display='none';
    try{
      var perm=await Notification.requestPermission();
      if(perm!=='granted'){ return; }
      if(await subscribePush()) testBtn.style.display='block';
    }catch(e){ console.warn('push enable failed',e); }
  });
  testBtn.addEventListener('click', async function(){
    try{ await fetch('/api/push/test',{ method:'POST' }); }catch(e){ console.warn('test push failed',e); }
  });
})();
</script>
