<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family Bazar - Retail OS (New Design Preview)</title>
<meta name="theme-color" content="#0A2540">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<link rel="apple-touch-icon" href="/icons/icon.svg">

<meta name="mobile-web-app-capable" content="yes">

<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --line:#ececf0; --ink:#161a26; --muted:#6b7280;
    --blue:#2447d6; --blue-soft:#eef2ff; --navy:#14213d;
    --green:#16a34a; --green-bg:#e8f5ee; --amber:#d97706; --amber-bg:#fef3c7; --red:#dc2626; --red-bg:#fee2e2;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 6px 20px rgba(16,24,40,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .side{width:236px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:16px 18px 14px}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),#4f6bff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
  .brand b{font-size:15px;line-height:1.1}
  .brand span{font-size:10.5px;color:var(--muted);letter-spacing:.6px;font-weight:700}
  .nav{padding:6px 10px;overflow:auto;flex:1}
  .nav .lbl{font-size:10.5px;color:#9aa1ad;font-weight:800;letter-spacing:.6px;padding:14px 10px 6px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;color:#3d4353;font-weight:600;font-size:14px;cursor:pointer;margin:1px 0}
  .nav a:hover{background:#f6f7f9}
  .nav a.active{background:var(--blue-soft);color:var(--blue)}
  .nav a .ico{width:18px;height:18px;flex:none;color:currentColor;opacity:.9}
  .nav a .badge{margin-left:auto;background:var(--amber-bg);color:var(--amber);font-size:11px;font-weight:800;border-radius:999px;padding:1px 8px}
  .userbox{border-top:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;gap:10px}
  .userbox .av{width:34px;height:34px;border-radius:50%;background:#dbe3ff;color:var(--blue);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:13px}
  .userbox .nm{font-size:13px;font-weight:700} .userbox .rl{font-size:11px;color:var(--muted)}
  /* main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 44px;position:sticky;top:0;z-index:20}
  .search{flex:1;max-width:560px;display:flex;align-items:center;gap:9px;background:#f3f4f6;border:1px solid var(--line);border-radius:11px;padding:9px 13px;color:var(--muted);font-size:14px}
  .search input{border:0;background:transparent;outline:none;flex:1;font-size:14px;color:var(--ink)}
  .roleseg{display:inline-flex;background:#f0f1f4;border-radius:10px;padding:3px}
  .roleseg button{border:0;background:transparent;padding:6px 12px;border-radius:8px;font-weight:700;font-size:13px;color:#5b6270;cursor:pointer}
  .roleseg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .synced{display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--muted);font-weight:600}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px}
  .content{padding:26px 44px 64px;max-width:1360px;width:100%;margin:0 auto}
  h1.hello{font-size:24px;margin:4px 0 2px;font-weight:800}
  .hello small{font-size:13px;color:var(--muted);font-weight:600;margin-left:8px}
  /* kpi */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin:18px 0}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:15px;padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .t{font-size:12.5px;color:var(--muted);font-weight:600}
  .kpi .v{font-size:25px;font-weight:800;letter-spacing:-.5px;margin-top:7px;line-height:1}
  .kpi .s{font-size:12px;margin-top:7px;color:var(--muted)}
  .up{color:var(--green);font-weight:700} .down{color:var(--red);font-weight:700}
  .warn{color:var(--amber)}
  .grid2{display:grid;grid-template-columns:1.7fr 1fr;gap:16px}
  .hamb{display:none;border:0;background:transparent;color:var(--ink);cursor:pointer;padding:6px;margin-left:-4px;border-radius:9px}
  .hamb:hover{background:#f2f3f6}
  .navoverlay{display:none}
  @media(max-width:960px){
    .grid2{grid-template-columns:1fr}.detgrid{grid-template-columns:1fr!important}.detsub{grid-template-columns:1fr!important}
    .hamb{display:inline-flex}
    .side{position:fixed;top:0;left:0;z-index:70;width:82%;max-width:300px;height:100dvh;transform:translateX(-100%);transition:transform .24s ease;box-shadow:0 12px 44px rgba(10,20,40,.28);padding-top:env(safe-area-inset-top)}
    .side.open{transform:translateX(0)}
    .navoverlay.show{display:block;position:fixed;inset:0;background:rgba(10,20,40,.45);z-index:65}
    .topbar{padding:0 12px;gap:10px;padding-top:env(safe-area-inset-top)}
    .search{max-width:none}
    .content{padding-left:16px;padding-right:16px}
    .roleseg{display:none}
    .synced{display:none}
    .content{padding-bottom:96px}
  }
  /* bottom tab bar (mobile only) */
  .tabbar{display:none}
  @media(max-width:960px){
    .tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:#fff;border-top:1px solid var(--line);
            justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
    .tabbar a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;color:#8a92a3;font-size:10.5px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .tabbar a.active{color:var(--blue)}
    .tabbar a .ico{width:22px;height:22px;opacity:.95}
  }
  /* product cards (rendered instead of the wide table on phones) */
  .mcard{border:1px solid var(--line);border-radius:15px;padding:13px;margin-bottom:10px;background:#fff;box-shadow:var(--shadow)}
  .mcard .r1{display:flex;gap:11px;align-items:flex-start}
  .mcard .nm{font-weight:650;font-size:14.5px;line-height:1.25}
  .mcard .price{margin-left:auto;text-align:right;font-weight:800;font-size:15px;white-space:nowrap}
  .mcard .r2{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px;font-size:12px;color:var(--muted)}
  .mcard .acts{display:flex;gap:8px;margin-top:12px}
  .mcard .acts .btn{flex:1;justify-content:center;text-align:center}
  /* Global: turn wide data tables into labeled cards on phones */
  @media(max-width:960px){
    .content thead tr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
    .content table,.content tbody,.content tr,.content td{display:block;width:auto}
    .content table{border-collapse:separate;border-spacing:0}
    .content tbody tr{border:1px solid var(--line);border-radius:13px;margin:0 0 10px;padding:4px 13px;background:#fff;box-shadow:var(--shadow)}
    .content tbody tr:hover{background:#fff}
    .content td{display:flex;justify-content:space-between;align-items:center;gap:14px;text-align:right;padding:9px 0;border:0;border-bottom:1px solid #f4f5f7;white-space:normal;min-width:0}
    .content td [style*="min-width"]{min-width:0!important}
    .content tr td:last-child{border-bottom:0}
    .content td::before{content:attr(data-label);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:#9aa1ad;text-align:left;flex:none;max-width:46%}
    .content td:empty{display:none}
  }
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .card .hd{display:flex;align-items:center;justify-content:space-between;padding:15px 18px 6px}
  .card .hd b{font-size:15px}
  .card .bd{padding:8px 18px 18px}
  .seg{display:inline-flex;background:#f0f1f4;border-radius:9px;padding:3px}
  .seg button{border:0;background:transparent;padding:5px 12px;border-radius:7px;font-weight:700;font-size:12.5px;color:#5b6270;cursor:pointer}
  .seg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .health{display:flex;flex-direction:column;align-items:center;text-align:center}
  .sub{font-size:12px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:12px 10px;border-bottom:1px solid #f2f3f5;vertical-align:middle}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:#9aa1ad;font-weight:800}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:#fafbfc}
  tr:last-child td{border-bottom:0}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pill.in{background:#eef6f0;color:#4f8f6a} .pill.low{background:#fbf4e6;color:#a97e33} .pill.out{background:#f9edec;color:#b56a6a}
  .pill.over{background:#eef2fb;color:#5b78c2} .pill.dead{background:#f1f2f4;color:#8a919e}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 10px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 15px;font-size:13px;font-weight:600;color:#4d5361;cursor:pointer}
  .chips{align-items:center}
  .chip{display:inline-flex;align-items:center;line-height:1.1}
  .chip b{color:#9aa1ad;font-weight:700;margin-left:6px}
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .chip.on b{color:#c3cce0}
  .legend{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin:12px 2px 16px;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:7px;line-height:1}
  .legend i{width:8px;height:8px;border-radius:50%;display:inline-block;flex:none}
  .crumb{font-size:13px;color:var(--muted);margin-bottom:12px}
  .crumb a{color:var(--blue);font-weight:600;cursor:pointer}
  .tiles{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
  .tile{background:#f6f7f9;border:1px solid var(--line);border-radius:12px;padding:10px 14px;min-width:104px}
  .tile .tl{font-size:11.5px;color:var(--muted);font-weight:600}
  .tile .tv{font-size:19px;font-weight:800;margin-top:4px}
  .drow{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f1f2f4;font-size:14px}
  .drow:last-child{border-bottom:0}
  .aisug{background:#f7f8fb;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
  .aisug h4{margin:0 0 4px;font-size:14px}
  .aisug p{margin:0 0 9px;font-size:12.5px;color:var(--muted);line-height:1.45}
  .loct{display:flex;gap:10px}
  .loct .lc{flex:1;background:#f6f7f9;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .loct .lc .k{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.4px}
  .loct .lc .v{font-size:18px;font-weight:800;margin-top:4px}
  .cbar{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13px}
  .cbar .nm{width:88px;color:#4d5361}
  .cbar .tr{flex:1;background:#eef0f4;border-radius:6px;height:9px;overflow:hidden}
  .cbar .fl{height:100%;background:#7d93df;border-radius:6px}
  .cbar .vl{width:66px;text-align:right;color:var(--muted)}
  .mkt{display:flex;gap:10px;flex-wrap:wrap}
  .mkt .mc{flex:1;min-width:150px;background:#f6f7f9;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .tgl{width:38px;height:22px;border-radius:999px;border:0;background:#d7dbe2;position:relative;cursor:pointer;padding:0;transition:.15s;vertical-align:middle}
  .tgl.on{background:#7cae90}
  .tgl span{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .tgl.on span{left:18px}
  .attn{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f1f2f4;align-items:flex-start}
  .attn:last-child{border-bottom:0}
  .attn .d{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:none}
  .attn .tx{flex:1;font-size:13.5px;font-weight:600}
  .attn .tx small{display:block;color:var(--muted);font-weight:500;font-size:12px;margin-top:2px}
  .attn a{color:var(--blue);font-weight:700;font-size:13px;white-space:nowrap}
  .btn{background:var(--blue);color:#fff;border:0;border-radius:10px;padding:9px 15px;font-weight:700;font-size:14px;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--blue);border:1px solid var(--line)}
  .placeholder{background:#fff;border:1px dashed #cdd2dd;border-radius:16px;padding:48px 24px;text-align:center;color:var(--muted)}
  .placeholder h2{color:var(--ink);margin:6px 0}
  .previewflag{position:fixed;bottom:14px;left:14px;background:var(--navy);color:#fff;font-size:12px;font-weight:700;padding:7px 12px;border-radius:9px;z-index:50;box-shadow:var(--shadow)}
  .thumb{width:30px;height:30px;border-radius:7px;background:#f1f2f4;display:inline-flex;align-items:center;justify-content:center;color:#aab;flex:none}
  .toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin:16px 0}
  .toolbar input,.toolbar select{padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff}
  .toolbar input.search-in{flex:1;min-width:220px}
  .btn.sec{background:#fff;color:var(--blue);border:1px solid var(--line)}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:9px}
  .srcb{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;background:#f1f2f4;color:#98a0ac;letter-spacing:.3px;text-transform:uppercase}
  .modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal .mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
  .modal .mh b{font-size:17px}.modal .x{border:0;background:none;font-size:22px;cursor:pointer;color:#9aa1ad}
  .modal .mb{padding:18px 20px}.modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
  .fg{display:grid;grid-template-columns:1fr 1fr;gap:13px}.fg .full{grid-column:1/-1}
  .fld{display:flex;flex-direction:column;gap:5px}.fld label{font-size:12.5px;font-weight:600;color:#4d5361}
  .fld input,.fld select,.fld textarea{padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;outline:none;width:100%;font-family:inherit}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#161a26;color:#fff;padding:11px 20px;border-radius:11px;font-weight:600;z-index:200;opacity:0;transition:.25s;max-width:90%}
  .toast.show{opacity:1}
  .right{text-align:right}
</style>
</head>

function overviewData(range){
  const start=rangeStart(range);const today=range==='today';const byId={};S.products.forEach(p=>byId[p.id]=p);
  let rev=0,cogs=0,units=0;const hours=Array(24).fill(0);let byDay={};const prodAgg={};let chan={NRS:0,Clover:0,Web:0};
  (S.events||[]).forEach(e=>{if(e.type!=='Stock decrease')return;const t=new Date(e.timestamp).getTime();if(t<start)return;const u=Math.abs(e.qtyChange);const p=byId[e.productId];const r=(e.rev!=null)?e.rev:u*(p?(effPrice(p)||0):0);
    rev+=r;units+=u;if(p)cogs+=u*(p.costPrice||0);
    const dd=new Date(e.timestamp);if(today)hours[dd.getHours()]+=r;else byDay[dd.toISOString().slice(0,10)]=(byDay[dd.toISOString().slice(0,10)]||0)+r;
    const n=e.note||'';if(/clover/i.test(n))chan.Clover+=r;else if(/nrs/i.test(n))chan.NRS+=r;else if(/web/i.test(n))chan.Web+=r;
    if(p){const a=prodAgg[p.id]||(prodAgg[p.id]={p,u:0,r:0});a.u+=u;a.r+=r;}
  });
  // Sync headline revenue/units/channel to the accurate salesDaily store (matches Clover + the Sales tab).
  if(hasDaily()){ const rr=rangeYmd(range); const dd=dailyAggClient(rr.from,rr.to);
    rev=dd.net; units=dd.units; byDay=dd.byDay;
    chan={NRS:(dd.bySource.nrs||{}).net||0, Clover:(dd.bySource.clover||{}).net||0, Web:(dd.bySource.web||{}).net||0}; }
  const net=rev-cogs;
  const invRetail=S.products.reduce((a,p)=>a+(effPrice(p)||0)*(p.qty||0),0);
  const low=S.products.filter(p=>stockState(p)==='low');const out=S.products.filter(p=>stockState(p)==='out');
  const pending=(S.requests||[]).filter(r=>r.status==='Open').length;
  const inStore=(S.posSales||[]).filter(o=>new Date(o.date).getTime()>=start).length;
  const online=(S.webSales||[]).filter(o=>new Date(o.date).getTime()>=start).length;
  const fast=Object.values(prodAgg).sort((a,b)=>b.u-a.u).slice(0,5);
  const cutoff=Date.now()-90*864e5;const dead=S.products.filter(p=>(p.qty||0)>0&&(!p.lastSale||new Date(p.lastSale).getTime()<cutoff)).length;
  const noImg=S.products.filter(p=>p.websiteEnabled&&!p.image).length;
  const outPct=S.products.length?out.length/S.products.length*100:0;
  const invScore=Math.max(30,Math.round(100-outPct*1.5));const cashScore=net>0?92:(rev>0?74:60);
  const flagged=S.products.filter(p=>p.websiteEnabled).length;const pub=S.products.filter(p=>p.wooId).length;
  const mktScore=flagged?Math.round(pub/flagged*100):70;const reqScore=pending===0?100:Math.max(45,100-pending*4);
  const overall=Math.round((invScore*.3+cashScore*.3+mktScore*.2+reqScore*.2));
  return {today,range,rev,net,units,margin:rev?net/rev*100:0,invRetail,low,out,pending,inStore,online,hours,byDay,chan,fast,dead,noImg,
    health:{overall,inv:invScore,cash:cashScore,mkt:mktScore,req:reqScore,pending},prodCount:S.products.length};
}

function hourChart(hours){
  const nowH=new Date().getHours();const max=Math.max(1,...hours);const W=760,H=180,pad=26,n=24;
  const bw=(W-2*pad)/n-4;
  let bars='';for(let h=0;h<n;h++){const hh=Math.max(2,(hours[h]/max)*(H-pad-24));const x=pad+h*((W-2*pad)/n);const y=H-24-hh;
    const cur=h===nowH;bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${hh.toFixed(1)}" rx="3" fill="${cur?'#2447d6':(h<=nowH?'#c7d2fe':'#eef1f6')}"/>`;}
  const labs=[9,12,15,18,21].map(h=>`<text x="${(pad+h*((W-2*pad)/n)+bw/2).toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="10" fill="#9aa1ad">${h===12?'12pm':h<12?h+'am':(h-12)+'pm'}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${bars}${labs}</svg>`;
}
function donut(score){
  const R=46,r=32,C=60;const frac=Math.max(0,Math.min(1,score/100));const a0=-Math.PI/2,a1=a0+frac*2*Math.PI;
  const x0=C+R*Math.cos(a0),y0=C+R*Math.sin(a0),x1=C+R*Math.cos(a1),y1=C+R*Math.sin(a1);
  const xr0=C+r*Math.cos(a1),yr0=C+r*Math.sin(a1),xr1=C+r*Math.cos(a0),yr1=C+r*Math.sin(a0);const lg=frac>.5?1:0;
  return `<svg viewBox="0 0 120 120" style="width:118px;height:118px">
    <circle cx="60" cy="60" r="39" fill="none" stroke="#eef1f6" stroke-width="14"/>
    <path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${R} ${R} 0 ${lg} 1 ${x1.toFixed(1)} ${y1.toFixed(1)} L${xr0.toFixed(1)} ${yr0.toFixed(1)} A${r} ${r} 0 ${lg} 0 ${xr1.toFixed(1)} ${yr1.toFixed(1)} Z" fill="#16a34a"/>
    <text x="60" y="60" text-anchor="middle" font-size="26" font-weight="800" fill="#161a26">${score}</text>
    <text x="60" y="76" text-anchor="middle" font-size="10" fill="#9aa1ad">/ 100</text></svg>`;
}

  let l=(S.products||[]).filter(p=>((p.name||'')+' '+(p.brand||'')+' '+(p.sku||'')+' '+(p.barcode||'')+' '+(p.category||'')).toLowerCase().includes(q));
  if(pCat)l=l.filter(p=>(p.category||'')===pCat);
  if(pBrand)l=l.filter(p=>(p.brand||'')===pBrand);
  if(pSrc)l=l.filter(p=>(p.source||'')===pSrc);
  if(pStock)l=l.filter(p=>stockState(p)===pStock);
  if(pMkt==='web')l=l.filter(p=>p.websiteEnabled||p.wooId);
  else if(pMkt==='noweb')l=l.filter(p=>!(p.websiteEnabled||p.wooId));
  l.sort((a,b)=>{switch(pSort){
    case 'best':return (_sold[b.id]||0)-(_sold[a.id]||0);
    case 'price':return (effPrice(b)||0)-(effPrice(a)||0);
    case 'stock':return (a.qty||0)-(b.qty||0);
    case 'margin':return (marginPct(b)??-1e9)-(marginPct(a)??-1e9);
    default:return (a.name||'').toLowerCase()<(b.name||'').toLowerCase()?-1:1;}});
  return l}

function prodStats(p){
  const now=Date.now();const d30=now-30*864e5,d60=now-60*864e5;
  let u30=0,r30=0,u60p=0;const chan={},dayUnits={};
  (S.events||[]).forEach(e=>{if(e.productId!==p.id||e.type!=='Stock decrease')return;const t=new Date(e.timestamp).getTime();const u=Math.abs(e.qtyChange);const rev=(e.rev!=null)?e.rev:u*(effPrice(p)||0);
    if(t>=d30){u30+=u;r30+=rev;const w=new Date(e.timestamp).getDay();dayUnits[w]=(dayUnits[w]||0)+u;const n=e.note||'';const ch=/web/i.test(n)?'Website':/amazon/i.test(n)?'Amazon':/walmart/i.test(n)?'Walmart':/tiktok/i.test(n)?'TikTok Shop':'In-store';chan[ch]=(chan[ch]||0)+u;}

  const profit30=r30-u30*(p.costPrice||0);const rate=u30/30;const dts=rate>0?Math.round((p.qty||0)/rate):null;

}

const EXP_CATS=['Rent','Utilities','Payroll','Insurance','Software & POS','Marketing','Maintenance','Repairs','Supplies','Bank & card fees','Shipping','Taxes & licenses','Other'];
// Bill occurrence dates (by its real cycle) that fall inside [from,to], regardless of when it was set up.
function billOccsInWindow(it, fromStr, toStr){
  const out=[]; const f=it.frequency; const anchor=it.startDate||toStr;
  const from=new Date(fromStr+'T00:00:00'), to=new Date(toStr+'T23:59:59'); const end=it.endDate?new Date(it.endDate+'T23:59:59'):null;
  const A=new Date(anchor+'T12:00:00'); const push=d=>{ if(d>=from&&d<=to&&(!end||d<=end)) out.push(d.toISOString().slice(0,10)); };
  if(f==='once'){ push(new Date(anchor+'T12:00:00')); return out; }
  if(f==='monthly'){ const dom=A.getDate(); let y=from.getFullYear(),m=from.getMonth();
    for(let i=0;i<16;i++){ const dim=new Date(y,m+1,0).getDate(); push(new Date(y,m,Math.min(dom,dim),12)); m++; if(m>11){m=0;y++;} if(new Date(y,m,1,12)>to)break; } return out; }
  if(f==='yearly'){ for(let y=from.getFullYear();y<=to.getFullYear()+1;y++) push(new Date(y,A.getMonth(),A.getDate(),12)); return out; }
  if(f==='weekly'||f==='biweekly'){ const step=(f==='weekly'?7:14)*864e5; let t=A.getTime(); while(t>from.getTime())t-=step; while(t<from.getTime())t+=step; let g=0; while(t<=to.getTime()&&g<400){ push(new Date(t)); t+=step; g++; } return out; }
  return out;
}
// Date-wise expenses: each recurring bill counts in the period its due date falls in, using the ACTUAL
// per-occurrence amount (from an email confirm) when present, else the bill's current amount.
function expensesForPeriod(days){
  let fromStr,toStr;
  if(typeof days==='string' && typeof SALES_PRESETS!=='undefined' && SALES_PRESETS.some(p=>p[0]===days)){ const r=rangeYmd(days); fromStr=r.from; toStr=r.to; }
  else { if(typeof days==='string')days=presetDays(days); const now=new Date(); toStr=ymdLocal(now); fromStr=ymdLocal(new Date(now.getFullYear(),now.getMonth(),now.getDate()-(days-1),12)); }
  const days2=Math.max(1,Math.round((new Date(toStr+'T12:00:00')-new Date(fromStr+'T12:00:00'))/864e5)+1);
  let total=0,fixed=0,variable=0;const byCat={};
  const add=(it,amt)=>{ if(!(amt>0))return; total+=amt; if(it.amountType==='variable')variable+=amt; else fixed+=amt; const c=it.category||'Other'; byCat[c]=(byCat[c]||0)+amt; };
  const pay=(S.manualFinance||{}).payments||{};
  (((S.manualFinance||{}).recurring)||[]).forEach(it=>{ if(it.active===false||it.paused)return;
    const okeys=Object.keys(pay).filter(k=>k.indexOf(it.id+'|')===0);
    const emailKeys=okeys.filter(k=>/email/.test((pay[k]&&pay[k].source)||''));
    if(emailKeys.length){
      // Utility/variable bill from email: count ONLY its actual recorded bills, on their usage-month date.
      emailKeys.forEach(k=>{ const rec=pay[k]; if(rec.status==='skipped')return; const dstr=k.slice(k.indexOf('|')+1);
        if(dstr>=fromStr&&dstr<=toStr) add(it, rec.amount!=null?Number(rec.amount):(Number(it.amount)||0)); });
    } else if(it.frequency==='daily'){ const a=Number(it.amount)||0; if(a>0)add(it,a*days2); }
    else { billOccsInWindow(it, fromStr, toStr).forEach(due=>{ const o=pay[it.id+'|'+due]; if(o&&o.status==='skipped')return; add(it, mfOccAmount(it,due)); }); }
  });
  // Legacy ad-hoc expense store (kept so anything still writing to it is not lost).
  const cut=Date.now()-days2*864e5;
  (S.expenses||[]).forEach(x=>{let amt=0;if(x.recurring)amt=(x.amount||0)*(days2/30);else{const t=x.date?new Date(x.date).getTime():0;if(t>=cut)amt=(x.amount||0);}if(!amt)return;total+=amt;if(x.type==='fixed')fixed+=amt;else variable+=amt;byCat[x.category||'Other']=(byCat[x.category||'Other']||0)+amt;});
  return {total,fixed,variable,byCat};}

function donutMulti(parts,size){size=size||128;const R=size/2,cx=R,cy=R,r=R*0.6;const tot=parts.reduce((a,p)=>a+p.value,0)||1;

function mfDueDatesInRange(item,from,to){
  const out=[]; if(!item||!item.startDate)return out; const start=item.startDate, end=item.endDate||'9999-12-31';
  const lo=from>start?from:start, hi=to<end?to:end; if(lo>hi)return out; const f=item.frequency||'monthly';
  if(f==='once'){ if(start>=from&&start<=to&&start<=end)out.push(start); return out; }
  if(f==='daily'){ let d=lo,gd=0; while(d<=hi&&gd<3660){ if(d>=start&&d<=end)out.push(d); d=mfAddDays(d,1); gd++; } return out; }
  if(f==='weekly'||f==='biweekly'){ const step=f==='weekly'?7:14; let d=start,gd=0; while(d<lo&&gd<9999){d=mfAddDays(d,step);gd++;} while(d<=hi&&gd<9999){out.push(d);d=mfAddDays(d,step);gd++;} return out; }
  if(f==='monthly'){ const dt=new Date(start+'T12:00:00'), dom=dt.getDate(); let y=dt.getFullYear(),mo=dt.getMonth(),gd=0;
    while(gd<600){ const cs=new Date(y,mo,Math.min(dom,mfDaysInMonth(y,mo)),12).toISOString().slice(0,10); if(cs>hi)break; if(cs>=lo&&cs>=start&&cs<=end)out.push(cs); mo++; if(mo>11){mo=0;y++;} gd++; } return out; }
  if(f==='yearly'){ const dt=new Date(start+'T12:00:00'); let y=dt.getFullYear(),gd=0;
    while(gd<300){ const cs=new Date(y,dt.getMonth(),dt.getDate(),12).toISOString().slice(0,10); if(cs>hi)break; if(cs>=lo&&cs>=start&&cs<=end)out.push(cs); y++; gd++; } return out; }
  return out; }

function mfOccKey(id,due){return id+'|'+due;}
function mfOcc(id,due){const mf=mfEnsure();return (mf.payments||{})[mfOccKey(id,due)]||null;}
function mfOccAmount(item,due){const o=mfOcc(item.id,due);return (o&&o.amount!=null&&o.amount!=='')?Number(o.amount):(Number(item.amount)||0);}
function mfNextDue(item){const t=mfTodayStr();const ds=mfDueDatesInRange(item,t,mfAddDays(t,800));return ds.length?ds[0]:(item.frequency==='once'?item.startDate:null);}
function mfOneoff(b){return (((b||{}).oneoff)||[]).reduce((a,o)=>a+mfNum(o.amount),0);}
function mfRecDueList(book,date){const mf=mfEnsure();return (mf.recurring||[]).filter(it=>it.active!==false && !it.paused && (book==='merged'||it.book===book) && mfDueOnDate(it,date));}

function mfPhoneSales(p){const s=(p||{}).sales||{};return ['phone','accessory','repair','otherSales','service'].reduce((a,k)=>a+mfNum(s[k]),0);}
function mfDayMetrics(rec,date){ rec=rec||{}; const g=rec.general||{}, p=rec.phone||{};
  const gSales=mfNum(g.sales), gGpPct=(g.gpPct!==''&&g.gpPct!=null)?mfNum(g.gpPct):mfDefGp();
  const gGP=gSales*gGpPct/100, gCOGS=gSales-gGP, gExp=mfOneoff(g)+(date?mfRecExp('general',date):0), gNet=gGP-gExp;
  const pSales=mfPhoneSales(p), pGpPct=(p.gpPct!==''&&p.gpPct!=null)?mfNum(p.gpPct):mfDefGp();
  const pGP=pSales*pGpPct/100, pCOGS=pSales-pGP, pExp=mfOneoff(p)+(date?mfRecExp('phone',date):0), pNet=pGP-pExp;
  return { general:{sales:gSales,gp:gGP,cogs:gCOGS,exp:gExp,net:gNet,gpPct:gGpPct,margin:gSales?gNet/gSales*100:0},
    phone:{sales:pSales,gp:pGP,cogs:pCOGS,exp:pExp,net:pNet,gpPct:pGpPct,margin:pSales?pNet/pSales*100:0},
    combined:{sales:gSales+pSales,gp:gGP+pGP,cogs:gCOGS+pCOGS,exp:gExp+pExp,net:gNet+pNet} }; }
function mfCompute(book){
  const w=winOf(salesRangeKey); const mf=mfEnsure(); const days=mf.days||{};

  for(const d in days){ if(d<w.from||d>w.to)continue; const rec=days[d], g=rec.general||{}, p=rec.phone||{};
    if(book!=='phone'){ const s=mfNum(g.sales),gp=(g.gpPct!==''&&g.gpPct!=null)?mfNum(g.gpPct):mfDefGp(); salesTot+=s;estGP+=s*gp/100;oneoffExp+=mfOneoff(g); }
    if(book!=='general'){ const s=mfPhoneSales(p),gp=(p.gpPct!==''&&p.gpPct!=null)?mfNum(p.gpPct):mfDefGp(); salesTot+=s;estGP+=s*gp/100;oneoffExp+=mfOneoff(p); }
  }
  let recExp=0;
  (mf.recurring||[]).forEach(it=>{ if(it.active===false||it.paused)return; if(book!=='merged'&&it.book!==book)return;
    mfDueDatesInRange(it,w.from,w.to).forEach(due=>{ const o=mfOcc(it.id,due); if(o&&o.status==='skipped')return; recExp+=mfOccAmount(it,due); }); });

}

function mfDaysInMonthNow(){ const d=new Date(); return mfDaysInMonth(d.getFullYear(),d.getMonth()); }
function mfDaysInYearNow(){ const y=new Date().getFullYear(); return ((y%4===0&&y%100!==0)||y%400===0)?366:365; }
function mfPeriodDays(p){ return p==='weekly'?7:p==='monthly'?mfDaysInMonthNow():p==='yearly'?mfDaysInYearNow():1; }
function mfPeriodWord(p){ return p==='weekly'?'week':p==='monthly'?'month':p==='yearly'?'year':'day'; }
function mfCycleDays(freq){ return freq==='daily'?1:freq==='weekly'?7:freq==='biweekly'?14:freq==='monthly'?mfDaysInMonthNow():freq==='yearly'?mfDaysInYearNow():0; }
function mfPerDayCost(it){ if(!recLive(it)||it.frequency==='once')return 0; const cd=mfCycleDays(it.frequency); return cd>0?(Number(it.amount)||0)/cd:0; }
function mfDaySalesFor(book){ const rec=(mfEnsure().days||{})[mfDate]||{}; return book==='phone'?mfPhoneSales(rec.phone||{}):mfNum((rec.general||{}).sales); }
function mfDayGpFor(book){ const rec=(mfEnsure().days||{})[mfDate]||{}; const b=(book==='phone'?rec.phone:rec.general)||{}; return (b.gpPct!==''&&b.gpPct!=null)?mfNum(b.gpPct):mfDefGp(); }
function mfEstCompute(book,period){ const days=mfPeriodDays(period);
  const dailySales=mfDaySalesFor(book), sales=dailySales*days;
  const gpPct=mfDayGpFor(book), gp=sales*gpPct/100, cogs=sales-gp;
  const perDay=(mfEnsure().recurring||[]).filter(it=>recLive(it)&&it.book===book&&it.frequency!=='once').reduce((a,it)=>a+mfPerDayCost(it),0);
  const exp=perDay*days, net=gp-exp;
  return {dailySales,sales,gpPct,gp,cogs,exp,net,margin:sales?net/sales*100:0,perDay,days}; }
function mfEstCombined(period){ const g=mfEstCompute('general',period),p=mfEstCompute('phone',period);
  const sales=g.sales+p.sales,net=g.net+p.net;
  return {sales,gp:g.gp+p.gp,cogs:g.cogs+p.cogs,exp:g.exp+p.exp,net,days:g.days,margin:sales?net/sales*100:0}; }
function mfExpPeriodTotal(book,period){ const days=mfPeriodDays(period);
  return (mfEnsure().recurring||[]).filter(it=>recLive(it)&&it.book===book&&it.frequency!=='once').reduce((a,it)=>a+mfPerDayCost(it)*days,0); }

/* Shared prepared-expense table (Expense | Amount | Status) used by BOTH Cash Entry and Automated Finance. */
function mfExpenseTable(book, period){
  period=period||'monthly'; const per=mfPeriodWord(period); const mf=mfEnsure();
  const items=(mf.recurring||[]).filter(it=>it.book===book&&!it.paused);
  const cur=mfExpTab[book]||'monthly';
  const tabs=[['daily','Daily'],['weekly','Weekly'],['biweekly','Bi-weekly'],['monthly','Monthly'],['yearly','Yearly'],['once','One-time']];
  const dotFor=f=>{ const ex=items.filter(it=>it.frequency===f);
     const due=f==='daily'?false:ex.some(it=>{ if(!(Number(it.amount)>0))return false; const nd=mfNextDue(it); if(!nd)return false; const o=mfOcc(it.id,nd); if(o&&(o.status==='paid'||o.status==='skipped'))return false; return nd<=mfTodayStr(); });
     if(due)return true;
     const filled=new Set(); ex.forEach(it=>{ if(Number(it.amount)>0){ filled.add((it.name||'').trim().toLowerCase()); if(it.preset)filled.add(it.preset.trim().toLowerCase()); } });
     const presetsMissing=((MF_PRESETS[book]||{})[f]||[]).filter(nm=>!mfPresetHidden(book,f,nm)).some(nm=>!filled.has(nm.toLowerCase()));
     const existingBlank=ex.some(it=>(it.name||'').trim() && !(Number(it.amount)>0));
     return presetsMissing||existingBlank; };
  const tabBtns=tabs.map(t=>`<button class="mf-etab${cur===t[0]?' on':''}" onclick="mfExpTab.${book}='${t[0]}';render()">${t[1]}${dotFor(t[0])?'<span class="mf-dot"></span>':''}</button>`).join('');
  const statusCell=(it,freq)=>{
     if(freq==='daily') return `<span class="mf-badge perday"><span class="d"></span>${it&&Number(it.amount)>0?'Per day':'Enter amount'}</span>`;
     if(!it||!(Number(it.amount)>0)) return `<span class="mf-badge wait"><span class="d"></span>Enter amount</span>`;
     const nd=mfNextDue(it); const o=nd?mfOcc(it.id,nd):null; const paid=o&&o.status==='paid';
     if(!nd) return `<span class="mf-badge wait"><span class="d"></span>-</span>`;
     if(paid){ const pt=o.paidDate?(' '+new Date(o.paidDate+'T12:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'})):''; return `<button class="mf-badge paid" onclick="mfCashTogglePaid('${it.id}','${nd}')"><span class="d"></span>Paid${pt}</button>`; }
     return `<button class="mf-badge due" onclick="mfCashTogglePaid('${it.id}','${nd}')"><span class="d"></span>Due</button>`; };
  const rowFor=(it,presetName,freq)=>{
     const amtVal=it&&it.amount?it.amount:'';
     const nameCell=it
       ?`<input class="mf-expname" value="${esc(it.name||'')}" placeholder="Expense name" onchange="mfExpRename('${it.id}',this.value)">`
       :`<input class="mf-expname" value="${esc(presetName)}" data-p="${esc(presetName)}" onchange="mfPresetRename('${book}',this.dataset.p,'${freq}',this.value)">`;
     const amtOn=it?`mfExpSetAmt('${it.id}',this.value)`:`mfPresetAmt('${book}',this.dataset.n,'${freq}',this.value)`;
     const dataN=it?'':` data-n="${esc(presetName)}"`;
     const del=it?`<button class="mf-x" onclick="mfExpRemove('${it.id}')">${mfIcon('trash',15,'#9aa1ad')}</button>`:`<button class="mf-x" title="Remove this row" onclick="mfPresetHide('${book}',this.dataset.p,'${freq}')" data-p="${esc(presetName)}">${mfIcon('trash',15,'#9aa1ad')}</button>`;
     return `<div class="mf-exprow2">
        <div class="mf-namewrap">${nameCell}</div>
        <div class="mf-amtin"><span>$</span><input type="number" inputmode="decimal" step="0.01"${dataN} value="${amtVal}" placeholder="0" onchange="${amtOn}"></div>
        ${statusCell(it,freq)}${del}
     </div>`; };
  const existing=items.filter(it=>it.frequency===cur);
  const used=new Set(); existing.forEach(it=>{ used.add((it.name||'').trim().toLowerCase()); if(it.preset)used.add(it.preset.trim().toLowerCase()); });
  const presets=((MF_PRESETS[book]||{})[cur]||[]).filter(nm=>!used.has(nm.toLowerCase())&&!mfPresetHidden(book,cur,nm));
  let rowsHtml=existing.map(it=>rowFor(it,null,cur)).join('')+presets.map(nm=>rowFor(null,nm,cur)).join('');
  if(!rowsHtml) rowsHtml=`<div class="sub" style="padding:8px 2px">No ${mfFreqLabel(cur).toLowerCase()} expenses yet. Add one below.</div>`;
  return `<div class="mf-sec"><span>Expenses</span><span class="amt">${money2(mfExpPeriodTotal(book,period))} / ${per}</span></div>
    <div class="mf-etabs">${tabBtns}</div>
    <div class="mf-exphead"><span>Expense</span><span>Amount</span><span>Status</span><span></span></div>
    ${rowsHtml}
    <button class="mf-addbtn" onclick="mfExpAddInline('${book}','${cur}')">${mfIcon('plus',14,'#4f6ef7')} Add custom expense</button>`;
}

const MF_CATS=['Payroll','Rent','Utilities','Insurance','License/Permit','Loan/Debt','Tax','Software','Marketing','Other'];

function recLive(it){ return it&&it.active!==false&&!it.paused; }
function recFreqGroup(f){ return (f==='weekly'||f==='biweekly')?'wk':(f==='monthly'?'mo':(f==='yearly'?'yr':'one')); }
function recMonthlyEquiv(it){ if(!recLive(it))return 0; const a=Number(it.amount)||0; return it.frequency==='weekly'?a*52/12:it.frequency==='biweekly'?a*26/12:it.frequency==='monthly'?a:0; }
function recFiltered(){ return (mfEnsure().recurring||[]).filter(it=> recFilter==='all'||it.book===recFilter); }
function recStatusOf(it){ if(it.paused)return ['','Paused']; const nd=mfNextDue(it); if(!nd)return ['','-']; const o=mfOcc(it.id,nd); if(o&&o.status==='paid')return ['in','Paid']; const t=mfTodayStr(); if(nd<t)return ['out','Overdue']; if(nd===t)return ['low','Due today']; const days=Math.round((new Date(nd+'T12:00')-new Date(t+'T12:00'))/864e5); return days<=(Number(it.reminderDays)||3)?['low','Due soon']:['','Upcoming']; }
function recLastPaid(it){ const mf=mfEnsure(); let last=null; for(const k in (mf.payments||{})){ if(k.indexOf(it.id+'|')!==0)continue; const o=mf.payments[k]; if(o&&o.status==='paid'&&o.paidDate&&(!last||o.paidDate>last))last=o.paidDate; } return last; }
function recUpcoming(from,to){ const out=[]; recFiltered().forEach(it=>{ if(!recLive(it))return; mfDueDatesInRange(it,from,to).forEach(dd=>{ const o=mfOcc(it.id,dd); out.push({it,dd,paid:!!(o&&o.status==='paid'),skipped:!!(o&&o.status==='skipped'),amt:mfOccAmount(it,dd)}); }); }); out.sort((a,b)=>a.dd<b.dd?-1:1); return out; }
function mfRecPause(id){ const it=mfEnsure().recurring.find(x=>x.id===id); if(it){ it.paused=!it.paused; save(); render(); toast(it.paused?'Paused':'Resumed'); } }
function recAddDefault(bk,nm,cat,fr){ const variable=/electric|phone|tax|gas|water|garbage/i.test(nm); recPrefill={book:bk,name:nm,category:cat,frequency:fr,amount:'',startDate:mfTodayStr(),amountType:variable?'variable':'fixed',reminderDays:3,active:true}; mfRecModal(); }
function recRow(it){ const sp=recStatusOf(it); const nd=mfNextDue(it); const lp=recLastPaid(it); const paidNow=nd&&mfOcc(it.id,nd)&&mfOcc(it.id,nd).status==='paid';

function recUpcomingCard(){ const t=mfTodayStr(); const now=new Date();

/* ============================================================
   FINANCE COMPARISON - Automated (POS) vs Manual (owner) for the selected period.
   ============================================================ */
function viewFinanceCompare(){
  const a=salesAgg(salesRangeKey); const autoCogs=finCogs(salesRangeKey); const autoGP=a.rev-autoCogs;
  const autoExp=expensesForPeriod(salesRangeKey).total; const autoNet=autoGP-autoExp;
  const m=mfCompute('merged');
  const hasCost=(S.products||[]).some(p=>Number(p.costPrice)>0);
  const row=(label,av,mv,fmt)=>{const d=av-mv;const f=fmt||money2;return `<tr><td style="font-weight:600">${label}</td><td class="right">${f(av)}</td><td class="right">${f(mv)}</td><td class="right" style="color:${Math.abs(d)<0.5?'#5b6b7f':(d>=0?'#4f8f6a':'#b56a6a')};font-weight:600">${d>=0?'+':''}${f(d)}</td></tr>`;};
  const pct=(av,mv)=>{const base=Math.max(Math.abs(av),Math.abs(mv),1);return Math.abs(av-mv)/base*100;};
  const salesGap=pct(a.rev,m.salesTot);
  const status = m.salesTot===0 ? ['low','No manual data','Enter manual sales to compare.']
    : salesGap<3 ? ['in','Aligned','Automated and manual agree within 3%.']
    : salesGap<10 ? ['low','Minor variance','Within 10% - review the larger days.']
    : ['out','Needs review','Automated and manual differ by more than 10%.'];
  const missing=[];
  if(!hasCost) missing.push('Product costs incomplete → automated COGS/gross profit is understated.');
  if(m.salesTot===0) missing.push('No manual sales entered for this period.');
  if(autoExp===0) missing.push('No expenses in the automated system for this period.');
  return `<div class="sub" style="margin:2px 0 10px">Side-by-side for <b>${rangeLabel(salesRangeKey)}</b>. Automated = Clover + NRS + integrations. Manual = owner bookkeeping (merged books).</div>
   <div class="kpis">
     <div class="kpi"><div class="t">Reconciliation</div><div class="v" style="font-size:18px"><span class="pill ${status[0]}">${status[1]}</span></div><div class="s">${status[2]}</div></div>
     <div class="kpi"><div class="t">Sales difference</div><div class="v" style="color:${Math.abs(a.rev-m.salesTot)<0.5?'#161a26':'#b07508'}">${money2(a.rev-m.salesTot)}</div><div class="s">auto − manual</div></div>
     <div class="kpi"><div class="t">Est. profit difference</div><div class="v" style="color:${Math.abs(autoNet-m.estNet)<0.5?'#161a26':'#b07508'}">${money2(autoNet-m.estNet)}</div></div>
   </div>
   <div class="card"><div class="hd"><b>Automated vs Manual</b></div><div class="bd"><table><thead><tr><th>Metric</th><th class="right">Automated</th><th class="right">Manual</th><th class="right">Difference</th></tr></thead><tbody>
     ${row('Net sales',a.rev,m.salesTot)}
     ${row('Gross profit',autoGP,m.estGP)}
     <tr><td class="sub" style="padding-left:14px">how it's derived</td><td class="right sub">${hasCost?'product costs':'costs incomplete'}</td><td class="right sub">${Math.round(m.gpPct)}% estimate</td><td></td></tr>
     ${row('Operating expenses',autoExp,m.expTot)}
     ${row('Net profit',autoNet,m.estNet)}
   </tbody></table></div></div>
   <div class="card" style="margin-top:16px"><div class="hd"><b>Missing data / to reconcile</b></div><div class="bd">${missing.length?missing.map(x=>`<div style="display:flex;gap:8px;padding:6px 0"><span style="color:#d97706">•</span><span>${esc(x)}</span></div>`).join(''):'<div class="sub" style="padding:8px 0">Nothing outstanding - both systems have data for this period. ✓</div>'}
     <div class="sub" style="font-size:12px;margin-top:8px">As product costs and integrations complete, the automated column becomes the single source of truth and the manual system can be retired.</div>
   </div></div>`;
}

/* ---- Bills detected from email (Con Edison etc.): confirm the amount in one tap ---- */
function financeDetectedBills(){
  let all=Object.values(S.billDetections||{}).filter(d=>d&&d.status==='new');
  // Hide a receipt (payment) when the same provider has a bill for the same amount - the bill is the one to
  // confirm, and confirming it auto-marks the receipt paid. Receipt-only vendors (no matching bill) stay visible.
  const billAmts=new Set(all.filter(d=>d.kind!=='payment'&&d.amount!=null).map(d=>d.providerId+'|'+Math.round(Number(d.amount))));
  all=all.filter(d=> d.kind!=='payment' || !billAmts.has(d.providerId+'|'+Math.round(Number(d.amount))));
  // A utility sends several emails per cycle (bill ready, reminder, autopay). Collapse to one row per
  // actual bill: group amount-bearing emails by provider+amount (keep the one that also has a due date);
  // group amount-less notices by provider+month, and drop them when that provider already has an amount.
  const score=d=>(d.amount!=null?2:0)+(d.dueDate?1:0);
  const groups={};
  all.forEach(d=>{ const k=d.amount!=null ? (d.providerId+'|a'+Math.round(Number(d.amount))) : (d.providerId+'|m'+String(d.receivedAt||'').slice(0,7));
    if(!groups[k] || score(d)>score(groups[k]) || (score(d)===score(groups[k]) && String(d.receivedAt)>String(groups[k].receivedAt))) groups[k]=d; });
  let dets=Object.values(groups);
  // Drop anything already confirmed for this provider+amount (so a confirmed bill never re-appears).
  const confirmed=new Set(Object.values(S.billDetections||{}).filter(d=>d&&d.status==='confirmed'&&d.amount!=null).map(d=>d.providerId+'|a'+Math.round(Number(d.amount))));
  dets=dets.filter(d=>d.amount==null || !confirmed.has(d.providerId+'|a'+Math.round(Number(d.amount))));
  const provHasAmount=new Set(dets.filter(d=>d.amount!=null).map(d=>d.providerId));
  dets=dets.filter(d=>d.amount!=null || !provHasAmount.has(d.providerId));
  dets.sort((a,b)=>String(b.dueDate||b.receivedAt||'').localeCompare(String(a.dueDate||a.receivedAt||'')));
  const row=d=>{ const has=d.amount!=null; const isPay=d.kind==='payment';
    const meta = isPay ? (d.paidDate?' · paid '+esc(d.paidDate):' · paid') : (d.dueDate?' · '+(d.dueEstimated?'billing':'due')+' '+esc(d.dueDate):'');
    return `<div style="display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:11px 0;border-top:1px solid var(--line)">
       <div><b>${esc(d.provider)}</b> <span class="sub">${esc(d.matchName||'')}${meta}${d.invoiceNo?' · #'+esc(d.invoiceNo):''}</span></div>
       <div style="font-weight:700;white-space:nowrap">${has?money2(d.amount):'<span class="sub" style="font-weight:400">no amount in email</span>'}</div>
       <div style="display:flex;gap:6px">${has?`<button class="btn sm" onclick="billConfirm('${d.key}')">${isPay?'Confirm paid':'Confirm'}</button>`:`<button class="btn sec sm" onclick="go('cashentry')">Enter</button>`}<button class="btn sec sm" onclick="billDismiss('${d.key}')">Dismiss</button></div>
     </div>`; };
  // Recently auto-paid from a receipt/payment email (peace-of-mind audit).
  const paid=Object.values(S.billDetections||{}).filter(d=>d&&d.kind==='payment'&&d.status==='applied')
    .sort((a,b)=>String(b.receivedAt||'').localeCompare(String(a.receivedAt||''))).slice(0,4);
  const paidStrip=paid.length?`<div style="border-top:1px solid var(--line);margin-top:10px;padding-top:9px">
     <div class="sub" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Auto-paid from email</div>
     ${paid.map(d=>`<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0"><span>${esc(d.provider)} <span class="sub">${d.paidDate?'· paid '+esc(d.paidDate):''}</span></span><b style="color:#12855a">${money2(d.amount||0)}</b></div>`).join('')}
   </div>`:'';
  return `<div class="card" style="margin-bottom:16px${dets.length?';border-color:#c9dcff':''}"><div class="bd" style="padding:14px 16px">
     <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap"><b>Bills detected from email</b><span style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn sec sm" onclick="billProvidersModal()">Providers</button><button class="btn sec sm" onclick="billScan()">Scan inbox now</button><button class="btn sec sm" onclick="billScan(true)">Reset &amp; re-scan</button></span></div>
     ${dets.length?dets.map(row).join(''):'<div class="sub" style="padding:9px 0 2px">No bills waiting to confirm. ROS checks hourly and lists new electric / utility bills here - you confirm the amount in one tap.</div>'}
     ${paidStrip}
   </div></div>`;
}

            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><button class="btn" onclick="mkGen('new')">Generate</button><button class="btn sec" onclick="mkGen('shorten')">Shorten</button><button class="btn sec" onclick="mkGen('translate')">En Español</button><button class="btn sec" onclick="mkSample()">Use sample</button></div>

let chSearch='', chSel=[], chCat='', chStat='';
const PUBCH=[['websiteEnabled','Website'],['google','Google'],['amazon','Amazon'],['walmart','Walmart'],['tiktok','TikTok']];
function blockedCh(p,flag){if(flag==='websiteEnabled')return false;return !p.image||!p.brand;}
function chToggle(id,flag){const p=(S.products||[]).find(x=>x.id===id);if(!p)return;p[flag]=!p[flag];p.lastUpdated=nowIso();save();render();}
function chSelToggle(id){const i=chSel.indexOf(id);if(i<0)chSel.push(id);else chSel.splice(i,1);render();}
function bulkPublish(){if(!chSel.length){toast('Select products first');return}chSel.forEach(id=>{const p=(S.products||[]).find(x=>x.id===id);if(p)p.websiteEnabled=true;});const n=chSel.length;chSel=[];save();render();toast('Flagged '+n+' for website - hit Publish flagged to push live');}
function pubCell(p,flag){const on=!!p[flag];const st=on?(blockedCh(p,flag)?'fix':'on'):'off';const map={on:['#eef6f0','#4f8f6a','ON'],off:['#f2f3f5','#9aa1ad','OFF'],fix:['#fbf4e6','#a97e33','FIX']};const c=map[st];
  const cp=(p.channelPrices||{});const override=cp[flag]!=null;const eff=override?cp[flag]:(effPrice(p)||0);
  const price=on?`<span style="font-size:10.5px;margin-top:2px;color:${override?'#2447d6':'#aab0bb'};font-weight:${override?'700':'400'}">${money2(eff)}</span>`:'<span style="font-size:10.5px;margin-top:2px;color:#d3d7de">-</span>';
  return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:0">
    <button onclick="chToggle('${p.id}','${flag}')" style="border:0;cursor:pointer;background:${c[0]};color:${c[1]};font-weight:800;font-size:11px;border-radius:999px;padding:4px 0;min-width:54px">${c[2]}</button>${price}</div>`;}
function prodIssue(p){if(!(p.websiteEnabled||p.amazon||p.walmart||p.tiktok||p.google))return null;if(!p.image)return 'needs a product image';if(!p.brand)return 'brand field empty';if(effPrice(p)==null)return 'no price set';if(!p.category||p.category==='Other')return 'category missing';return null;}
function channelIssues(){const P=S.products||[];const out=[];for(const p of P){const iss=prodIssue(p);if(iss)out.push({p,iss});if(out.length>=12)break;}return out;}
const CH_FEE={websiteEnabled:3,google:3,amazon:15,walmart:15,tiktok:8};
function chNet(flag){const pe=document.getElementById('cpr_'+flag),fe=document.getElementById('fee_'+flag),ne=document.getElementById('net_'+flag);if(!pe||!ne)return;const price=Number(pe.value||0);const fee=Number((fe&&fe.value)||0);const cost=Number((document.getElementById('m_cost')||{}).value||0);const ship=Number((document.getElementById('m_ship')||{}).value||0);if(!price){ne.textContent='-';ne.style.color='#9aa1ad';return;}const np=price*(1-fee/100)-ship-cost;const nm=np/price*100;ne.textContent=Math.round(nm)+'%';ne.style.color=nm>=0?'#4f8f6a':'#b56a6a';}
function chSuggest(flag){const cost=Number((document.getElementById('m_cost')||{}).value||0);const ship=Number((document.getElementById('m_ship')||{}).value||0);const margin=Number((document.getElementById('m_margin')||{}).value||0);const fee=Number((document.getElementById('fee_'+flag)||{}).value||0);if(!cost){toast('Set a unit cost first');return;}const denom=1-fee/100-margin/100;if(denom<=0){toast('Fees + margin exceed 100%');return;}document.getElementById('cpr_'+flag).value=((cost+ship)/denom).toFixed(2);chNet(flag);}
async function chAiPrice(id){const notes=document.getElementById('ai_notes');notes.style.display='';notes.textContent='Asking AI (fees + market positioning)…';
  const margin=Number((document.getElementById('m_margin')||{}).value||20);const ship=Number((document.getElementById('m_ship')||{}).value||0);
  const fees={website:Number((document.getElementById('fee_websiteEnabled')||{}).value||3),google:Number((document.getElementById('fee_google')||{}).value||3),amazon:Number((document.getElementById('fee_amazon')||{}).value||15),walmart:Number((document.getElementById('fee_walmart')||{}).value||15),tiktok:Number((document.getElementById('fee_tiktok')||{}).value||8)};
  try{const r=await fetch('/api/ai/pricing',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id,margin,ship,fees})});const d=await r.json();if(d.error)throw new Error(d.error);const s=d.suggestions||{};const map={website:'websiteEnabled',google:'google',amazon:'amazon',walmart:'walmart',tiktok:'tiktok'};Object.keys(map).forEach(k=>{if(s[k]!=null){const el=document.getElementById('cpr_'+map[k]);if(el){el.value=Number(s[k]).toFixed(2);chNet(map[k]);}}});notes.textContent=s.notes?('AI: '+s.notes):'AI filled channel prices from fees + market positioning.';}catch(e){notes.textContent='AI pricing failed: '+(e.message||e);}}
function chPriceModal(id){const p=(S.products||[]).find(x=>x.id===id);if(!p)return;const cp=p.channelPrices||{};const retail=effPrice(p)||0;const cost=(p.costPrice!=null&&p.costPrice!=='')?Number(p.costPrice):0;
  document.getElementById('mdl').innerHTML=`<div class="mh"><b>Channel prices - ${esc(p.name)}</b><button class="x" onclick="closeModal()">×</button></div>
   <div class="mb">
     <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:12px;font-size:13px">
       <span class="sub">Retail <b style="color:#161a26">${money2(retail)}</b></span>
       <span style="display:inline-flex;align-items:center;gap:6px"><label style="font-weight:600">Cost $</label><input id="m_cost" type="number" step="0.01" value="${cost||''}" style="width:78px;padding:6px 8px;border:1px solid var(--line);border-radius:8px" oninput="PUBCH.forEach(c=>chNet(c[0]))"></span>
       <span style="display:inline-flex;align-items:center;gap:6px"><label style="font-weight:600">Target margin %</label><input id="m_margin" type="number" value="20" style="width:60px;padding:6px 8px;border:1px solid var(--line);border-radius:8px"></span>
       <span style="display:inline-flex;align-items:center;gap:6px"><label style="font-weight:600">Shipping $</label><input id="m_ship" type="number" step="0.01" value="0" style="width:64px;padding:6px 8px;border:1px solid var(--line);border-radius:8px" oninput="PUBCH.forEach(c=>chNet(c[0]))"></span>
       <button class="btn sm" onclick="chAiPrice('${id}')">AI suggest ▸</button>
     </div>
     <div id="ai_notes" class="sub" style="display:none;margin-bottom:12px;background:#f7f8fb;border:1px solid var(--line);border-radius:10px;padding:9px 11px"></div>
     <table style="font-size:13.5px"><thead><tr><th>Channel</th><th class="right">Fee %</th><th class="right">Price</th><th class="right">Net margin</th><th></th></tr></thead><tbody>
       ${PUBCH.map(c=>`<tr><td style="font-weight:600">${c[1]}</td>
         <td class="right"><input id="fee_${c[0]}" type="number" step="0.1" value="${CH_FEE[c[0]]}" style="width:58px;text-align:right;padding:5px 7px;border:1px solid var(--line);border-radius:8px" oninput="chNet('${c[0]}')"></td>
         <td class="right"><input id="cpr_${c[0]}" type="number" step="0.01" value="${cp[c[0]]!=null?cp[c[0]]:''}" placeholder="= ${retail.toFixed(2)}" style="width:82px;text-align:right;padding:5px 7px;border:1px solid var(--line);border-radius:8px" oninput="chNet('${c[0]}')"></td>
         <td class="right" id="net_${c[0]}" style="font-weight:600;color:#9aa1ad">-</td>
         <td class="right"><button class="btn sec sm" onclick="chSuggest('${c[0]}')">Suggest</button></td></tr>`).join('')}
     </tbody></table>
     <p class="sub" style="margin-top:10px">"Suggest" = cost + that channel's fee + shipping, priced to hit your target margin. "AI suggest" also weighs typical marketplace/competitor pricing - an estimate, since there's no live competitor feed. Blank price = use retail.</p>
   </div>
   <div class="mf"><button class="btn sec" onclick="closeModal()">Cancel</button><button class="btn" onclick="chPriceSave('${id}')">Save</button></div>`;
  showModal();setTimeout(()=>PUBCH.forEach(c=>chNet(c[0])),0);}
function chPriceSave(id){const p=(S.products||[]).find(x=>x.id===id);const cp={};PUBCH.forEach(c=>{const v=val('cpr_'+c[0]);if(v!=='')cp[c[0]]=Number(v);});p.channelPrices=cp;if(cp.websiteEnabled!=null)p.webPrice=cp.websiteEnabled;else if(p.webPrice!=null)delete p.webPrice;p.lastUpdated=nowIso();save();closeModal();render();toast('Channel prices saved');}

function backupData(){download('family-bazar-backup-'+new Date().toISOString().slice(0,10)+'.json',JSON.stringify(S,null,2));toast('Backup downloaded');}
function restoreModal(){document.getElementById('mdl').innerHTML=`<div class="mh"><b>Restore from backup</b><button class="x" onclick="closeModal()">×</button></div>
   <div class="mb"><div class="sub" style="margin-bottom:10px">Upload a backup JSON to load it into this server - used to seed a fresh cloud instance from your local data. <b>This replaces the current data.</b></div>
     <input id="restoreFile" type="file" accept=".json,application/json" style="font-size:13px">
   </div><div class="mf"><button class="btn sec" onclick="closeModal()">Cancel</button><button class="btn" onclick="restoreBackup()">Restore</button></div>`;showModal();}
async function restoreBackup(){const inp=document.getElementById('restoreFile');if(!inp||!inp.files.length){toast('Choose a backup file');return}
  try{const obj=JSON.parse(await inp.files[0].text());if(!obj||!Array.isArray(obj.products))throw new Error('Not a valid ROS backup (no products array)');
    if(!confirm('Replace this server’s data with the backup? '+obj.products.length+' products will be loaded.'))return;
    toast('Restoring…');const r=await fetch('/api/state',{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify(obj)});if(!r.ok)throw new Error('server rejected the restore');
    await load();closeModal();render();toast('Restored '+obj.products.length+' products');
  }catch(e){toast('Restore failed: '+(e.message||e));}}
function integFields(key){switch(key){
  case 'ai':return [{id:'aiProvider',label:'AI provider',type:'select',options:['anthropic','openai'],val:SET.aiProvider||'anthropic'},{id:'aiApiKey',label:'AI API key',type:'secret',set:SET.aiConfigured},{id:'aiModel',label:'Model (optional)',type:'text',val:SET.aiModel||''},{id:'upcApiKey',label:'UPCitemdb key (optional)',type:'secret',set:SET.upcConfigured}];
  case 'clover':return [{id:'cloverMerchantId',label:'Merchant ID',type:'text',val:SET.cloverMerchantId||''},{id:'cloverApiToken',label:'API token',type:'secret',set:SET.cloverConfigured},{id:'cloverBase',label:'API base URL',type:'text',val:SET.cloverBase||'https://api.clover.com'},{id:'cloverSalesSync',label:'Auto-pull sales each minute',type:'bool',val:!!SET.cloverSalesSync}];
  case 'woo':return [{id:'wooUrl',label:'Store URL',type:'text',val:SET.wooUrl||'',ph:'https://familybazarny.com'},{id:'wooKey',label:'Consumer key',type:'secret',set:SET.wooConfigured},{id:'wooSecret',label:'Consumer secret',type:'secret',set:SET.wooConfigured},{id:'wooPublishMode',label:'Publish mode',type:'select',options:['draft','publish'],val:SET.wooPublishMode||'draft'},{id:'wooAutoSync',label:'Auto-publish flagged changes',type:'bool',val:!!SET.wooAutoSync},{id:'wooOrderSync',label:'Pull web orders to cut stock',type:'bool',val:!!SET.wooOrderSync}];
  case 'sms':return [{id:'twilioSid',label:'Account SID',type:'secret',set:SET.smsConfigured},{id:'twilioToken',label:'Auth token',type:'secret',set:SET.smsConfigured},{id:'twilioFrom',label:'From number',type:'text',val:SET.twilioFrom||'',ph:'+1...'}];
  case 'email':return [{id:'sendgridKey',label:'SendGrid API key',type:'secret',set:SET.emailConfigured},{id:'fromEmail',label:'From email',type:'text',val:SET.fromEmail||''},{id:'fromName',label:'From name',type:'text',val:SET.fromName||'Family Bazar'}];
  case 'nrs':return [{id:'nrsFolder',label:'Watched folder path',type:'text',val:SET.nrsFolder||'',ph:'C:\\\\...\\\\nrs-inbox'},{id:'nrsAutoImport',label:'Auto-import CSVs dropped in this folder',type:'bool',val:!!SET.nrsAutoImport}];
  case 'nrsemail':return [{id:'imapHost',label:'IMAP host',type:'text',val:SET.imapHost||'imap.gmail.com'},{id:'imapPort',label:'IMAP port',type:'text',val:SET.imapPort||'993'},{id:'imapUser',label:'Gmail address',type:'text',val:SET.imapUser||''},{id:'imapPass',label:'Gmail app password',type:'secret',set:SET.imapConfigured},{id:'imapSender',label:'Only read mail from (optional)',type:'text',val:SET.imapSender||'',ph:'reports@nrsplus.com'},{id:'nrsEmailFetch',label:'Auto-fetch NRS reports from Gmail every 15 min',type:'bool',val:!!SET.nrsEmailFetch}];
  default:return [];}}
const INTEG_TITLE={ai:'AI & barcode lookup',clover:'Clover POS',woo:'WooCommerce website',sms:'Twilio SMS',email:'SendGrid email',nrs:'NRS auto-import (folder)',nrsemail:'NRS reports by Gmail'};
function integManage(key){const fs=integFields(key);
  const fld=f=>{if(f.type==='select')return `<div class="fld"><label>${f.label}</label><select id="ig_${f.id}">${f.options.map(o=>`<option ${f.val===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
    if(f.type==='bool')return `<div class="fld full"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="ig_${f.id}" style="width:auto" ${f.val?'checked':''}> ${f.label}</label></div>`;
    if(f.type==='secret')return `<div class="fld full"><label>${f.label}</label><input type="password" id="ig_${f.id}" placeholder="${f.set?'•••• set - leave blank to keep':'not set'}" autocomplete="off"></div>`;
    return `<div class="fld full"><label>${f.label}</label><input id="ig_${f.id}" value="${esc(f.val||'')}" placeholder="${esc(f.ph||'')}"></div>`;};
  const hasSecret=fs.some(f=>f.type==='secret');
  document.getElementById('mdl').innerHTML=`<div class="mh"><b>${INTEG_TITLE[key]}</b><button class="x" onclick="closeModal()">×</button></div>
   <div class="mb"><div class="fg">${fs.map(fld).join('')}</div>
     ${hasSecret?`<p class="sub" style="margin-top:10px">Keys are saved to your local server and never shown back to the browser. Leave a secret blank to keep the current value.</p>`:''}</div>
   <div class="mf"><button class="btn sec" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveIntegration('${key}')">Save</button></div>`;
  showModal();}
async function saveIntegration(key){const fs=integFields(key);const body={};
  fs.forEach(f=>{const el=document.getElementById('ig_'+f.id);if(!el)return;if(f.type==='bool')body[f.id]=el.checked;else{const v=el.value.trim();if(v!=='')body[f.id]=v;}});
  try{const r=await fetch('/api/settings',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw 0;try{SET=await (await fetch('/api/settings')).json();}catch(e){}closeModal();render();toast('Saved');}catch(e){toast('Could not save keys');}}
async function integTest(which){toast('Testing connection…');try{const r=await fetch('/api/woo/test');const d=await r.json();toast(d.ok?(d.reachable?'WooCommerce reachable ✓':'Connected, no products yet'):'Failed: '+(d.error||'check keys'));}catch(e){toast('Test failed: '+(e.message||e));}}
async function nrsScanNow(){toast('Scanning NRS folder…');try{const r=await fetch('/api/nrs/scan',{method:'POST'});const d=await r.json();try{SET=await (await fetch('/api/settings')).json();}catch(e){}await load();render();toast('NRS folder scanned'+(d&&d.imported!=null?': '+d.imported+' file(s)':''));}catch(e){toast('Scan failed: '+(e.message||e));}}
async function nrsEmailFetchNow(){toast('Checking Gmail for NRS reports…');try{const r=await fetch('/api/nrs/email/fetch',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({days:14})});const d=await r.json();if(d.error)throw new Error(d.error);try{SET=await (await fetch('/api/settings')).json();}catch(e){}await load();render();toast('Gmail checked'+(d&&d.imported!=null?': '+d.imported+' report(s) imported':''));}catch(e){toast('Gmail fetch failed: '+(e.message||e));}}

async function chPublish(){if(!confirm('Publish all products flagged for the website?'))return;toast('Publishing…');try{const r=await fetch('/api/woo/publish',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({all:true})});const d=await r.json();const ok=(d.results||[]).filter(x=>x.ok).length;await load();render();toast('Published '+ok+' of '+((d.results||[]).length));}catch(e){toast('Publish failed: '+(e.message||e))}}
function csvEsc(v){v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function download(name,text){const b=new Blob([text],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);}
function exportProducts(){const P=S.products||[];const head=['name','sku','barcode','category','brand','retailPrice','salePrice','costPrice','qty','reorderThreshold','aisle','shelf','bin','supplier','source'];const rows=[head.join(',')].concat(P.map(p=>head.map(h=>csvEsc(p[h])).join(',')));download('family-bazar-products.csv',rows.join('\n'));toast('Exported '+P.length+' products');}
function exportSales(){const byId={};(S.products||[]).forEach(p=>byId[p.id]=p);const rows=[['date','product','type','qtyChange','revenue','tax','note'].join(',')];(S.events||[]).forEach(e=>{const p=byId[e.productId];rows.push([e.timestamp,csvEsc(p?p.name:''),e.type,e.qtyChange,(e.rev!=null?e.rev:''),(e.tax!=null?e.tax:''),csvEsc(e.note)].join(','));});download('family-bazar-sales.csv',rows.join('\n'));toast('Exported '+((S.events||[]).length)+' events');}
function exportInventory(){const P=S.products||[];const head=['name','sku','category','qty','cost','retail','stockValueCost','stockValueRetail'];const rows=[head.join(',')].concat(P.map(p=>{const c=p.costPrice||0,r=effPrice(p)||0,q=p.qty||0;return [csvEsc(p.name),csvEsc(p.sku),csvEsc(p.category),q,c,r,(c*q).toFixed(2),(r*q).toFixed(2)].join(',');}));download('inventory-valuation.csv',rows.join('\n'));toast('Inventory valuation exported');}
function exportReorder(){const P=(S.products||[]).filter(p=>stockState(p)!=='in');const head=['name','sku','supplier','qty','reorderAt','suggestedOrder','estCost'];const rows=[head.join(',')].concat(P.map(p=>{const q=reorderQty(p);return [csvEsc(p.name),csvEsc(p.sku),csvEsc(p.supplier),p.qty||0,p.reorderThreshold||0,q,((p.costPrice||0)*q).toFixed(2)].join(',');}));download('reorder-report.csv',rows.join('\n'));toast('Reorder report exported');}
function exportTaxReport(){const a=salesAgg(salesRangeKey);const rows=[['metric','value'].join(','),['period',rangeLabel(salesRangeKey)].join(','),['salesTaxCollected',a.tax.toFixed(2)].join(','),['taxedRevenue',a.rev.toFixed(2)].join(',')];download('sales-tax-summary.csv',rows.join('\n'));toast('Tax summary exported');}
function exportCustomers(){const C=S.customers||[];const head=['name','phone','email','points','tier'];const rows=[head.join(',')].concat(C.map(c=>[csvEsc(c.name),csvEsc(c.phone),csvEsc(c.email),c.points||0,csvEsc(c.tier||'Member')].join(',')));download('customers.csv',rows.join('\n'));toast('Customers exported');}
function exportDead(){const cut=Date.now()-45*864e5;const P=(S.products||[]).filter(p=>(p.qty||0)>0&&(!p.lastSale||new Date(p.lastSale).getTime()<cut));const head=['name','sku','qty','cost','tiedUpCost','lastSold'];const rows=[head.join(',')].concat(P.map(p=>[csvEsc(p.name),csvEsc(p.sku),p.qty||0,p.costPrice||0,((p.costPrice||0)*(p.qty||0)).toFixed(2),p.lastSale?new Date(p.lastSale).toISOString().slice(0,10):''].join(',')));download('dead-stock.csv',rows.join('\n'));toast('Dead stock exported');}
function exportChannelReport(){const a=salesAgg(salesRangeKey);const rows=[['channel','revenue'].join(',')].concat(Object.entries(a.chan).map(([k,v])=>[csvEsc(k),v.toFixed(2)].join(',')));download('channel-performance.csv',rows.join('\n'));toast('Channel report exported');}

function mdToHtml(t){let h=esc(t);h=h.replace(/^###\s?(.*)$/gm,'<h4 style="margin:12px 0 4px">$1</h4>').replace(/^##\s?(.*)$/gm,'<h4 style="margin:12px 0 4px">$1</h4>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/^\s*[-*]\s+(.*)$/gm,'<div style="margin:3px 0 3px 10px">• $1</div>').replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>');return h;}
async function runInsight(kind,title){aiTitle=title;aiOut='__loading__';render();try{const r=await fetch('/api/ai/insight',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({kind})});const d=await r.json();aiOut=d.text||d.error||'No response.';}catch(e){aiOut='Failed: '+(e.message||e);}render();}
async function askInsight(q){aiQ=q;aiTitle='Answer';aiOut='__loading__';render();try{const r=await fetch('/api/ai/ask',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({question:q})});const d=await r.json();aiOut=d.text||d.error||'No response.';}catch(e){aiOut='Failed: '+(e.message||e);}render();}
function runAsk(){const q=(document.getElementById('ai_q')||{}).value;if(!q||!q.trim()){toast('Type a question');return}askInsight(q.trim());}
function askChip(q){aiQ=q;askInsight(q);}
function aiCopy(){if(navigator.clipboard)navigator.clipboard.writeText(aiOut);toast('Copied');}

          <button class="btn sec" onclick="runInsight('reorder','Reorder plan by supplier')">Reorder plan by supplier</button>

      </div></div>
    </div>
    <div class="card"><div class="hd"><b>${aiTitle?esc(aiTitle):'Output'}</b>${aiOut&&aiOut!=='__loading__'?`<span><button class="btn sec sm" onclick="aiCopy()">Copy</button> <button class="btn sec sm" onclick="aiOut='';render()">Clear</button></span>`:''}</div><div class="bd">

async function catSaveAuto(){const autoNaming=!!document.getElementById('catAuto').checked;const weakNameBelow=Number(document.getElementById('catWeak').value)||80;await fetch('/api/settings',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({autoNaming,weakNameBelow})});catMsg='Saved.';render();}
async function catShowFlag(f){catFlag=f;catFlagItems=null;render();try{const r=await(await fetch('/api/catalog/flagged?flag='+encodeURIComponent(f)+'&limit=200')).json();catFlagItems=r.items||[];}catch(e){catFlagItems=[];}render();}

/* ============================================================
   FULFILLMENT - web pickup / delivery / repair queue (ported from index)
   Reads S.fulfillment + S.fulfillmentLocal (kept fresh by the server every 2 min).
   ============================================================ */
let opsFilter='all';
function fTimeAgo(iso){if(!iso)return'';const d=new Date(iso),s=Math.floor((Date.now()-d.getTime())/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+' min ago';if(s<86400)return Math.floor(s/3600)+' hr ago';return d.toLocaleDateString();}
function opsKey(o){return o.type+':'+String(o.code).toUpperCase();}
function fLocal(){return S.fulfillmentLocal||{};}
function opsStage(o){const s=(o.status||'').toUpperCase();if(s==='FULFILLED'||s==='PICKED_UP')return'done';if(s==='CANCELLED'||s==='EXPIRED')return'cancelled';const l=fLocal()[opsKey(o)];if(l&&l.stage==='preparing')return'preparing';if(l&&l.stage==='accepted')return'accepted';if(s==='READY')return'ready';return'new';}
const OPS_META={new:['low','New','Customer waiting'],accepted:['low','Accepted','Go collect the item'],preparing:['low','Preparing','Collecting the item'],ready:['in','Ready','Customer notified'],done:['','Completed','Picked up'],cancelled:['out','Cancelled','']};
function opsActions(o){const st=opsStage(o),A=[];const pickup=o.type==='repair'?'PICKED_UP':'FULFILLED';
  if(st==='new'){A.push(['Accept','ACCEPTED',false,true]);A.push(['Cancel','CANCELLED',false,false]);}
  else if(st==='accepted'){A.push(['Start preparing','PREPARING',false,true]);A.push(['Ready & notify','READY',true,false]);A.push(['Cancel','CANCELLED',false,false]);}
  else if(st==='preparing'){A.push(['Ready & notify','READY',true,true]);A.push(['Cancel','CANCELLED',false,false]);}
  else if(st==='ready'){A.push(['Picked up',pickup,false,true]);A.push(['Re-notify','READY',true,false]);}
  return A;}
function opsCard(o){
  const typeLabel={reservation:'Reservation',order:'Order',repair:'Repair',service:'Service'}[o.type]||o.type;
  const st=opsStage(o),m=OPS_META[st]||['','',''],l=fLocal()[opsKey(o)]||{};
  const bar=st==='ready'?'#16a34a':st==='new'?'#d97706':st==='cancelled'?'#dc2626':st==='done'?'#8a94a6':'#2447d6';
  const acts=opsActions(o).map(a=>`<button class="btn ${a[3]?'':'sec'} sm" onclick="opsAct('${o.type}','${esc(o.code)}','${a[1]}',${a[2]?'true':'false'})">${a[0]}</button>`).join(' ');
  const loclines=(o.lines&&o.lines.length)?o.lines.map(li=>{const where=[li.aisle&&('Aisle '+li.aisle),li.shelf&&('Shelf '+li.shelf),li.bin&&('Bin '+li.bin)].filter(Boolean).join(' · ');return `<div style="padding:4px 0;border-top:1px solid var(--line)"><div style="font-weight:600;font-size:13px">${li.qty}× ${esc(li.name)}</div>${where?`<div style="font-size:12px;color:#123b8f;font-weight:600">📍 ${esc(where)}</div>`:''}</div>`;}).join(''):'';
  const contact=o.phone?`<div style="display:flex;gap:6px;margin-top:8px"><a class="btn sec sm" href="tel:${esc(o.phone)}">Call</a><a class="btn sec sm" href="sms:${esc(o.phone)}">Text</a></div>`:'';
  const notif=l.notifiedAt?`<div style="font-size:11.5px;margin-top:8px;color:#146a2c;font-weight:600">✓ Notified ${fTimeAgo(l.notifiedAt)} · ${esc((l.notifiedVia||'').toUpperCase())}</div>`:'';
  return `<div class="card" style="border-left:4px solid ${bar}"><div class="bd" style="padding:14px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><span class="pill ${m[0]}">${m[1]}</span><span class="sub" style="font-size:11.5px" title="${new Date(o.createdAt).toLocaleString()}">${fTimeAgo(o.createdAt)}</span></div>
    <div style="font-size:12px;color:var(--muted);margin-top:3px">${esc(typeLabel)}${m[2]?' · '+esc(m[2]):''}${o.paid?` <span class="pill in">PAID${o.amountPaid!=null?' $'+Number(o.amountPaid).toFixed(2):''}</span>`:((o.fulfillment&&o.fulfillment!=='PICKUP')?' <span class="pill low">unpaid</span>':'')}</div>
    <div style="font-weight:800;margin-top:6px;font-size:15px">${esc(o.code)}</div>
    <div style="font-size:13px">${esc(o.name||'-')}${o.phone?' · '+esc(o.phone):''}</div>
    ${contact}
    ${o.phone?`<button class="btn sec sm" style="width:100%;margin-top:6px" onclick="openProfile({phone:'${esc(o.phone)}'})">View full profile ›</button>`:''}
    ${loclines?`<div style="margin-top:8px">${loclines}</div>`:(o.summary?`<div class="sub" style="font-size:12.5px;margin-top:8px">${esc(o.summary)}</div>`:'')}
    ${o.total!=null?`<div style="font-weight:700;margin-top:6px">$${Number(o.total).toFixed(2)}</div>`:''}
    ${Number(o.discount)>0?`<div class="pill low" style="margin-top:4px;display:inline-block">Apply $${Number(o.discount).toFixed(2)} discount${o.couponCode?' ('+esc(o.couponCode)+')':''} at register</div>`:''}
    ${o.pickupSlot?`<div class="pill" style="background:#e0e7ff;color:#3730a3;margin-top:4px;display:inline-block">🕑 Pickup: ${esc(o.pickupSlot)}</div>`:''}
    ${notif}
    ${acts?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">${acts}</div>`:(st==='done'?`<div class="sub" style="font-size:12px;margin-top:8px">Completed${l.completedAt?' '+fTimeAgo(l.completedAt):''}</div>`:'')}
  </div></div>`;
}
async function fPull(){toast('Refreshing orders…');try{const r=await(await fetch('/api/fulfillment/pull',{method:'POST'})).json();if(r.error)throw new Error(r.error);await load();render();toast((r.count||0)+' item(s)');}catch(e){toast('Refresh failed: '+e.message);}}
async function opsAct(type,code,status,notify){if(status==='CANCELLED'&&!confirm('Cancel this order? The customer will see it as cancelled.'))return;toast('Updating…');try{const r=await(await fetch('/api/fulfillment/act',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({type,code,status,notify})})).json();if(r.error)throw new Error(r.error);await load();render();toast(status==='READY'&&notify?(r.via?'Marked ready · notified by '+r.via:'Marked ready · add Twilio/SendGrid to text the customer'):'Updated');}catch(e){toast('Update failed: '+e.message);}}
function viewFulfillment(){
  const list=S.fulfillment||[];const today=iso=>{try{return new Date(iso).toDateString()===new Date().toDateString();}catch(e){return false;}};
  let nw=0,prep=0,ready=0,done=0;list.forEach(o=>{const st=opsStage(o);if(st==='new'&&today(o.createdAt))nw++;if(st==='accepted'||st==='preparing')prep++;if(st==='ready')ready++;if(st==='done')done++;});
  const open=list.filter(o=>!['done','cancelled'].includes(opsStage(o)));
  const chip=(v,l,n)=>`<button class="chip ${opsFilter===v?'on':''}" onclick="opsFilter='${v}';render()">${l}${n!=null?` <b>${n}</b>`:''}</button>`;
  let show=list;
  if(opsFilter==='new')show=list.filter(o=>opsStage(o)==='new');
  else if(opsFilter==='ready')show=list.filter(o=>opsStage(o)==='ready');
  else if(['reservation','order','repair','service'].includes(opsFilter))show=list.filter(o=>o.type===opsFilter);
  const ord={new:0,accepted:1,preparing:2,ready:3,done:5,cancelled:6};show=[...show].sort((a,b)=>ord[opsStage(a)]-ord[opsStage(b)]);
  const grid=show.length?`<div style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">${show.map(opsCard).join('')}</div>`:'<div class="card"><div class="bd"><div class="sub" style="padding:20px">Nothing here yet. New website pickups, deliveries and repairs land here automatically.</div></div></div>';
  return `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px"><h1 class="hello" style="margin:0">Fulfillment <small>${open.length} open</small></h1><button class="btn sec" onclick="fPull()">⟳ Refresh</button></div>
   <div class="kpis">
     <div class="kpi"><div class="t">New today</div><div class="v" style="color:#d97706">${nw}</div></div>
     <div class="kpi"><div class="t">Preparing</div><div class="v" style="color:#2447d6">${prep}</div></div>
     <div class="kpi"><div class="t">Ready</div><div class="v" style="color:#16a34a">${ready}</div></div>
     <div class="kpi"><div class="t">Completed</div><div class="v" style="color:var(--muted)">${done}</div></div>
   </div>
   <div class="chips">${chip('all','All',list.length)}${chip('new','New')}${chip('ready','Ready')}<span style="width:6px"></span>${chip('reservation','Reservations')}${chip('order','Orders')}${chip('repair','Repairs')}${chip('service','Services')}</div>
   ${grid}`;
}

function profileAddTag(){const el=document.getElementById('pf_tag');const v=(el&&el.value||'').trim().toLowerCase();if(!v)return;profileData.tags=Array.from(new Set([...(profileData.tags||[]),v]));saveProfileTags();}

/* ============================================================
   RECEIVING - supplier invoices → inventory (ported from index)
   ============================================================ */
let invoiceList=null,invoiceLoading=false,invoiceOpen=null,invPickIdx=null,invPickQ='';
const INV_METHOD={upc:'UPC',learned:'learned',sku:'SKU',name:'name',manual:'manual'};
function invConf(c){const n=Number(c);return n>=0.85?'in':n>=0.6?'low':'out';}
function invBadge(s){s=String(s||'');if(s==='posted')return'in';if(s==='failed')return'out';if(s==='partially_posted'||s==='needs_review')return'low';return'';}
function fileToB64(file){return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(String(rd.result).replace(/^data:[^,]+,/,''));rd.onerror=rej;rd.readAsDataURL(file);});}
async function invLoadList(){invoiceLoading=true;try{const d=await(await fetch('/api/invoices')).json();invoiceList=d.invoices||[];}catch(e){invoiceList=[];}invoiceLoading=false;render();}
async function invUpload(){

  const btn=document.getElementById('invUploadBtn');if(btn){btn.disabled=true;btn.textContent='Uploading…';}
  try{const files=[];for(const f of inp.files){files.push({name:f.name,mime:f.type||'image/jpeg',dataBase64:await fileToB64(f)});}
    const supplier=(document.getElementById('invSupplier')||{}).value||'';
    const d=await(await fetch('/api/invoices/upload',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({supplier,files})})).json();if(d.error)throw new Error(d.error);
    if(!d.duplicate){toast('Uploaded. Reading the invoice…');if(btn)btn.textContent='Reading invoice…';await fetch('/api/invoices/extract',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:d.id})});}
    await invLoadList();await invOpen(d.id);
  }catch(e){toast('Upload failed: '+e.message);}
