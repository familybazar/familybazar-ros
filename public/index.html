<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Bazar — Retail Operating System</title>
<style>
  :root{
    --bg:#0f172a; --panel:#ffffff; --muted:#64748b; --line:#e2e8f0;
    --brand:#1d4ed8; --brand-dark:#1e40af; --accent:#f59e0b;
    --green:#16a34a; --red:#dc2626; --amber:#d97706; --soft:#f1f5f9;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--soft);color:#0f172a;-webkit-font-smoothing:antialiased}
  header.topbar{background:linear-gradient(120deg,var(--brand-dark),var(--brand));color:#fff;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
  .logo{font-weight:800;font-size:20px;letter-spacing:.3px;display:flex;align-items:center;gap:10px}
  .logo .dot{background:var(--accent);color:#1e293b;border-radius:8px;padding:2px 8px;font-size:13px}
  .tagline{font-size:12px;opacity:.8;margin-left:-6px}
  .conn{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:rgba(255,255,255,.18)}
  .conn.ok{background:#16a34a} .conn.bad{background:#dc2626}
  nav.tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  nav.tabs button{background:rgba(255,255,255,.12);color:#fff;border:0;padding:9px 14px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
  nav.tabs button:hover{background:rgba(255,255,255,.25)}
  nav.tabs button.active{background:#fff;color:var(--brand-dark)}
  .role-split{display:flex;gap:6px;background:rgba(0,0,0,.18);padding:4px;border-radius:12px}
  main{max-width:1180px;margin:0 auto;padding:22px 20px 80px}
  h2.view-title{font-size:22px;margin:4px 0 18px}
  .sub{color:var(--muted);font-size:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .pad{padding:18px}
  .kiosk-hero{text-align:center;padding:26px 16px 10px}
  .kiosk-hero h1{font-size:30px;margin:6px 0}
  .searchbar{display:flex;gap:10px;max-width:680px;margin:14px auto;align-items:center}
  .searchbar input{flex:1;font-size:20px;padding:16px 18px;border:2px solid var(--line);border-radius:14px;outline:none}
  .searchbar input:focus{border-color:var(--brand)}
  .btn{background:var(--brand);color:#fff;border:0;border-radius:12px;padding:13px 18px;font-size:15px;font-weight:700;cursor:pointer}
  .btn:hover{background:var(--brand-dark)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.sec{background:var(--soft);color:#0f172a;border:1px solid var(--line)}
  .btn.sec:hover{background:#e2e8f0}
  .btn.warn{background:var(--red)}
  .btn.ghost{background:transparent;color:var(--brand);border:1px solid var(--brand)}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:9px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px auto;max-width:760px}
  .chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:600}
  .chip:hover{border-color:var(--brand);color:var(--brand)}
  .chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-top:18px}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:.15s;display:flex;flex-direction:column}
  .pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#cbd5e1}
  .thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:48px;background:var(--soft)}
  .pcard .body{padding:12px;flex:1;display:flex;flex-direction:column;gap:4px}
  .pcard .name{font-weight:700;font-size:15px;line-height:1.25}
  .pcard .brand{font-size:12px;color:var(--muted)}
  .price{font-weight:800;font-size:17px}
  .price .was{color:var(--muted);text-decoration:line-through;font-weight:500;font-size:13px;margin-right:6px}
  .badge{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  .badge.in{background:#dcfce7;color:#166534}
  .badge.low{background:#fef3c7;color:#92400e}
  .badge.out{background:#fee2e2;color:#991b1b}
  .cta-row{display:flex;gap:10px;margin-top:12px}
  .cta{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;height:44px;border-radius:12px;font-size:14px;font-weight:700;letter-spacing:.2px;text-decoration:none;cursor:pointer;transition:transform .08s ease,box-shadow .15s ease,background .15s ease,border-color .15s ease;-webkit-tap-highlight-color:transparent;user-select:none}
  .cta svg{width:17px;height:17px;flex:none}
  .cta-call{background:#1E8A3C;color:#fff;box-shadow:0 2px 8px rgba(30,138,60,.28)}
  .cta-call:hover{background:#187433;box-shadow:0 4px 14px rgba(30,138,60,.34)}
  .cta-call:active{transform:translateY(1px);box-shadow:0 1px 4px rgba(30,138,60,.28)}
  .cta-sms{background:#fff;color:#123B8F;border:1.5px solid #cdd9f0}
  .cta-sms:hover{background:#f2f6ff;border-color:#123B8F}
  .cta-sms:active{transform:translateY(1px)}
  .loc{font-size:13px;color:#334155;font-weight:600}
  .detail{display:grid;grid-template-columns:280px 1fr;gap:24px}
  .detail .big-thumb{height:280px;border-radius:14px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:120px}
  .locbox{display:flex;gap:14px;margin:14px 0}
  .locpill{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:12px 18px;text-align:center;min-width:84px}
  .locpill span{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .locpill b{font-size:22px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--soft)}
  tr:hover td{background:#fafcff}
  .right{text-align:right}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px}
  .toolbar input{flex:1;min-width:180px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.full{grid-column:1/-1}
  label{font-size:13px;font-weight:600;color:#334155}
  input,select,textarea{font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;outline:none;width:100%}
  input:focus,select:focus,textarea:focus{border-color:var(--brand)}
  textarea{resize:vertical;min-height:70px}
  .flags{display:flex;gap:16px;flex-wrap:wrap}
  .flags label{display:flex;align-items:center;gap:6px;font-weight:500}
  .flags input{width:auto}
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .stat .n{font-size:30px;font-weight:800;line-height:1}
  .stat .l{font-size:13px;color:var(--muted);margin-top:6px}
  .stat.danger .n{color:var(--red)} .stat.warn .n{color:var(--amber)} .stat.ok .n{color:var(--green)}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .section-h{font-size:15px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .empty{color:var(--muted);text-align:center;padding:34px;font-size:15px}
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:720px;width:100%;max-height:90vh;overflow:auto}
  .modal .head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;border-radius:18px 18px 0 0}
  .modal .head h3{margin:0;font-size:18px}
  .modal .foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
  .x{background:none;border:0;font-size:24px;cursor:pointer;color:var(--muted)}
  .pill-flags{display:flex;gap:4px;flex-wrap:wrap}
  .mini{font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;background:var(--soft);color:#475569}
  .mini.on{background:#dbeafe;color:#1e40af}
  .mini.good{background:#dcfce7;color:#166534}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;z-index:200;opacity:0;transition:.25s;box-shadow:var(--shadow);max-width:90%}
  .toast.show{opacity:1}
  .breadcrumb{color:var(--brand);cursor:pointer;font-weight:600;font-size:14px;margin-bottom:10px;display:inline-block}
  .note{font-size:13px;color:var(--muted);margin-top:8px;min-height:18px}
  .ai-row{display:flex;gap:8px;align-items:flex-end}
  /* ---- dashboard polish ---- */
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:18px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 16px 12px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .kpi .ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--soft);color:#475569}
  .kpi.blue .ico{background:#dbeafe;color:#1d4ed8} .kpi.green .ico{background:#dcfce7;color:#166534} .kpi.amber .ico{background:#fef3c7;color:#b45309} .kpi.violet .ico{background:#ede9fe;color:#6d28d9}
  .kpi .val{font-size:26px;font-weight:800;line-height:1.1;margin-top:10px;letter-spacing:-.5px}
  .kpi .lbl{font-size:12.5px;color:var(--muted);margin-top:2px}
  .kpi .spark{position:absolute;right:0;bottom:0;left:0;height:34px;opacity:.9}
  .pill{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px}
  .pill.up{background:#dcfce7;color:#166534} .pill.down{background:#fee2e2;color:#991b1b} .pill.flat{background:var(--soft);color:#64748b}
  .ins-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:18px}
  .ins{background:linear-gradient(135deg,#fff,#f8fafc);border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:center}
  .ins .em{width:38px;height:38px;border-radius:10px;background:#eef2f7;color:#1d4ed8;display:flex;align-items:center;justify-content:center;flex:none}
  .section-h svg{color:var(--brand)}
  .ins .t{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .ins .v{font-size:16px;font-weight:800;margin-top:2px}
  .dash-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:18px}
  @media(max-width:820px){.dash-grid{grid-template-columns:1fr}}
  @media(max-width:720px){.detail{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="topbar">
  <div>
    <div class="logo">Family Bazar <span class="dot">ROS</span></div>
    <div class="tagline">Retail Operating System · live server · build b45</div>
  </div>
  <span class="conn" id="conn">connecting…</span>
  <div class="role-split" id="roleSplit"></div>
  <nav class="tabs" id="tabs"></nav>
</header>
<main id="app"><div class="empty">Loading…</div></main>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* Add the ngrok-skip header to every request so tunnel warning pages never break API calls */
(function(){const _f=window.fetch.bind(window);window.fetch=function(u,o){o=o||{};const h=new Headers(o.headers||{});if(!h.has('ngrok-skip-browser-warning'))h.set('ngrok-skip-browser-warning','true');return _f(u,Object.assign({},o,{headers:h}))};})();
const CAT_EMOJI={'Grocery':'🛒','Beverages':'🥤','Snacks':'🍿','Household':'🧽','Health & Beauty':'🧴','Electronics':'🔌','Baby':'🍼','Pet':'🐾','Frozen':'🧊','Bakery':'🥖','Tobacco':'🚬','Other':'📦'};
const CATS=Object.keys(CAT_EMOJI);

let state={products:[],events:[],requests:[],searchLog:[]};
let view='kiosk', role='customer';
let kioskFilter={q:'',cat:'',brand:''};
let detailId=null, editId=null, modalOpen=false, pendingTags=[];
let settings={};

/* ---------- server data layer ---------- */
async function loadState(){
  const r=await fetch('/api/state'); state=await r.json();
  setConn(true);
}
let _pushT=null;
function save(){ clearTimeout(_pushT); _pushT=setTimeout(doPush,120); }
async function doPush(){
  try{ const r=await fetch('/api/state',{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify(state)});
    if(!r.ok) throw 0; setConn(true);
  }catch(e){ setConn(false); toast('⚠️ Could not save to server — is it running?'); }
}
function setConn(ok){const c=document.getElementById('conn');c.textContent=ok?'● live':'● offline';c.className='conn '+(ok?'ok':'bad');}

/* ---------- helpers ---------- */
function uid(p){return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function now(){return new Date().toISOString()}
function money(n){return n==null||n===''?'—':'$'+Number(n).toFixed(2)}
function emoji(p){return p.image?'':(CAT_EMOJI[p.category]||'📦')}
function stockState(p){if(p.qty<=0)return'out';if(p.qty<=p.reorderThreshold)return'low';return'in'}
function stockLabel(s){return s==='out'?'Out of Stock':s==='low'?'Low Stock':'Available'}
function effPrice(p){return p.salePrice!=null&&p.salePrice!==''?p.salePrice:p.retailPrice}
function webRegular(p){return(p.webPrice!=null&&p.webPrice!=='')?p.webPrice:p.retailPrice}
function isCustomWeb(p){return p.webPrice!=null&&p.webPrice!==''&&Number(p.webPrice)!==Number(p.retailPrice)}
function webPriceDisplay(p){return money(webRegular(p))+(isCustomWeb(p)?' <span class="mini on">web</span>':'')}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
/* ---- inline SVG icon set (Lucide-style, uses currentColor) ---- */
const ICONS={
  dollar:'<line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  cart:'<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>',
  receipt:'<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/>',
  award:'<circle cx="12" cy="8" r="6"/><path d="M15.48 12.88 17 22l-5-3-5 3 1.52-9.12"/>',
  calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  clock:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  layers:'<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
  pie:'<path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>',
  trending:'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
  grid:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
  box:'<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
  search:'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  spark:'<path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9L12 3z"/>',
  bars:'<line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>',
  alert:'<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  refresh:'<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>',
  tag:'<path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>',
  clipboard:'<path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/>',
  moon:'<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>',
  globe:'<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
  user:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  ban:'<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>',
  inbox:'<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>'
};
function ic(name,size,color){size=size||18;return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${color||'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;vertical-align:middle">${ICONS[name]||''}</svg>`}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600)}
function val(id){const e=document.getElementById(id);return e?e.value.trim():''}
function setVal(id,v){const e=document.getElementById(id);if(e)e.value=v}
function setSel(id,v){const e=document.getElementById(id);if(e)e.value=v}
function numv(id){const v=val(id);return v===''?null:Number(v)}
function chk(id){const e=document.getElementById(id);return e?e.checked:false}

/* ---------- navigation ---------- */
const STAFF_TABS=[['ops','Orders'],['products','Products'],['inventory','Inventory'],['categories','Categories'],['invoices','Invoices'],['website','Website'],['marketing','Marketing'],['requests','Requests'],['analytics','Analytics'],['settings','Settings']];
function setRole(r){role=r;view=r==='customer'?'kiosk':'products';detailId=null;render()}
function go(v){view=v;detailId=null;if(v==='settings'||v==='website'||v==='marketing'||v==='invoices'||v==='ops')loadSettings();if(v==='invoices')loadInvoices();if(v==='ops')loadFulfillment();render()}
function renderChrome(){
  document.getElementById('roleSplit').innerHTML=
    `<button onclick="setRole('customer')" style="display:inline-flex;align-items:center;gap:6px;background:${role==='customer'?'#fff':'transparent'};color:${role==='customer'?'#1e40af':'#fff'};border:0;padding:9px 14px;border-radius:9px;font-weight:700;cursor:pointer">${ic('cart',16)} Customer</button>

function logSearch(term,found){if(!term)return;state.searchLog.push({term:term.toLowerCase().trim(),found,timestamp:now()});save()}
function kioskSearch(v){kioskFilter.q=v;document.getElementById('kioskResults').innerHTML=kioskResultsHtml()}
function setCat(c){kioskFilter.cat=kioskFilter.cat===c?'':c;render()}
function setBrand(v){kioskFilter.brand=v;render()}
function filteredProducts(){
  let list=state.products.filter(p=>p.status!=='Archived');
  const q=kioskFilter.q.toLowerCase().trim();
  if(q)list=list.filter(p=>(p.name+' '+p.brand+' '+p.category+' '+p.subcategory+' '+p.barcode+' '+p.sku).toLowerCase().includes(q));
  if(kioskFilter.cat)list=list.filter(p=>p.category===kioskFilter.cat);
  if(kioskFilter.brand)list=list.filter(p=>p.brand===kioskFilter.brand);
  return list;
}

let prodSourceFilter='';
const SRC_COLORS={Clover:'#dcfce7|#166534',NRS:'#dbeafe|#1e40af',Sample:'#fee2e2|#991b1b',Manual:'#fef3c7|#92400e',Other:'#f1f5f9|#475569'};
function srcBadge(s){s=s||'Other';const c=(SRC_COLORS[s]||SRC_COLORS.Other).split('|');return `<span class="mini" style="background:${c[0]};color:${c[1]}">${esc(s)}</span>`}
function prodMatches(p){const q=prodSearch.toLowerCase();return (p.name+p.brand+p.sku+p.barcode+p.category).toLowerCase().includes(q) && (!prodSourceFilter||(p.source||'Other')===prodSourceFilter)}
function countFiltered(){return state.products.filter(prodMatches).length}
function viewProducts(){

  if(!prodSourceFilter){toast('Pick a source filter first');return}

   <div class="pad">

   </div>`;

function confirmDeleteFiltered(){
  if(val('delConfirm')!=='Family Bazar'){toast('Type Family Bazar exactly to confirm');return}

  try{
    const r=await fetch('/api/images/coverage',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({sample:60})});
    const d=await r.json(); if(d.error)throw new Error(d.error);
    const pct=Number(d.coveragePct)||0;
    const verdict = pct>=60 ? ['Strong — a paid image API is likely worth it.','#ecfdf5','#065f46']
      : pct>=30 ? ['Moderate — a paid API helps; plan staff photos for the rest.','#fffbeb','#92400e']
      : ['Low — most items aren’t in the databases; staff photos will do the work.','#fef2f2','#991b1b'];
    const row=(l,v,mut)=>`<div style="display:flex;justify-content:space-between;margin:2px 0${mut?';color:#6b7280':''}"><span>${l}</span><b>${v}</b></div>`;
    covPanel(`
      <div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:14px">📊 Image coverage</b><button class="btn sec sm" onclick="covClose()">✕</button></div>
      <div style="font-size:38px;font-weight:900;margin-top:8px;line-height:1">~${pct}%</div>
      <div class="sub">of barcoded, photo-less items would get a <b>free</b> photo</div>
      <div style="margin-top:10px;border-top:1px solid #eef1f6;padding-top:10px">
        ${row('Products total', d.totalProducts)}
        ${row('Already have a photo', d.withImage)}
        ${row('No photo', d.withoutImage)}
        ${row('— with barcode (checkable)', d.sampleable, true)}
        ${row('— no barcode (needs staff photo)', d.noBarcode, true)}
      </div>
      <div style="margin-top:10px;border-top:1px solid #eef1f6;padding-top:10px">
        <div class="sub">Sampled ${d.sampled}: found ${d.matched} images (Open Food Facts ${d.bySource.off}, UPCitemdb ${d.bySource.upcitemdb}${d.upcKeySet?'':' — trial'})</div>
        <div style="margin-top:6px"><b>Projected: ~${d.estimatedNewImages}</b> free photos across your ${d.sampleable} barcoded items.</div>
      </div>
      <div style="margin-top:10px;padding:8px 10px;border-radius:8px;background:${verdict[1]};color:${verdict[2]};font-weight:600">${verdict[0]}</div>
      ${(d.examples&&d.examples.length)?`<details style="margin-top:10px"><summary class="sub" style="cursor:pointer">See ${d.examples.length} sample matches</summary><div style="margin-top:6px">${d.examples.map(x=>`<div style="display:flex;gap:8px;align-items:center;margin:5px 0"><img src="${esc(x.image)}" style="width:36px;height:36px;object-fit:contain;border:1px solid #eef1f6;border-radius:6px;flex:none"><span style="font-size:11px;color:#374151">${esc(x.name||x.barcode)} <span style="color:#9ca3af">(${esc(x.src)})</span></span></div>`).join('')}</div></details>`:''}

  }catch(e){

  }
  if(btn){btn.disabled=false;btn.textContent='📊 Check image coverage';}

/* ----- bulk enrich (images + AI categories) ----- */
let enrichRunning=false;
async function enrichAll(){
  if(enrichRunning){enrichRunning=false;toast('Stopping after this batch…');return}
  if(!confirm('Auto-fill category, image, description and brand for items that are missing them — perfect for the Clover imports. Runs in batches; best results with a UPC key + AI key in Settings. Continue?'))return;
  enrichRunning=true;
  const btn=document.getElementById('enrichBtn');if(btn)btn.textContent='■ Stop enriching';
  let total=0;
  try{
    while(enrichRunning){
      const r=await fetch('/api/catalog/enrich',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({limit:25})});
      const d=await r.json();if(d.error)throw new Error(d.error);
      total+=d.processed;
      toast(`Enriching… ${total} done${d.remaining?` · ${d.remaining} to go`:''}`);
      if(!d.processed||!d.remaining)break;
    }
    await loadState();
    toast(`🪄 Enriched ${total} item(s). Next: add aisle/shelf for the kiosk, then flag + publish to the website.`);
  }catch(e){toast('Enrich failed: '+e.message)}
  enrichRunning=false;if(view==='products')render();
}

async function aiLookup(){
  const bc=val('f_barcode');if(!bc){toast('Enter a barcode first');return}
  const btn=document.getElementById('aiBtn');btn.disabled=true;btn.textContent='Looking…';
  try{
    const r=await fetch('/api/catalog/lookup',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({barcode:bc})});
    const d=await r.json();if(d.error)throw new Error(d.error);
    const s=d.suggestion||{};pendingTags=s.tags||[];
    if(s.name)setVal('f_name',s.name);if(s.brand)setVal('f_brand',s.brand);
    if(s.category)setSel('f_category',s.category);if(s.subcategory)setVal('f_subcategory',s.subcategory);
    if(s.description)setVal('f_description',s.description);if(s.image)setVal('f_image',s.image);
    document.getElementById('aiNote').innerHTML=(d.found?'✅ ':'ℹ️ ')+(d.source.length?('Source: '+d.source.join(' + ')+'. '):'')+esc((d.notes||[]).join(' '));
  }catch(e){document.getElementById('aiNote').textContent='Lookup failed: '+e.message}
  btn.disabled=false;btn.textContent='🔍 AI Lookup';
}

function saveProduct(){
  const name=val('f_name');if(!name){toast('Product name is required');return}
  const data={sku:val('f_sku')||uid('SKU').toUpperCase(),barcode:val('f_barcode'),name,brand:val('f_brand'),
    category:val('f_category'),subcategory:val('f_subcategory'),description:val('f_description'),image:val('f_image'),
    costPrice:numv('f_costPrice'),retailPrice:numv('f_retailPrice'),salePrice:numv('f_salePrice'),
    webPrice:chk('f_webSame')?null:numv('f_webPrice'),supplier:val('f_supplier'),
    qty:Number(val('f_qty')||0),reorderThreshold:Number(val('f_reorderThreshold')||0),overstockThreshold:Number(val('f_overstockThreshold')||50),
    status:val('f_status'),aisle:val('f_aisle'),shelf:val('f_shelf'),bin:val('f_bin'),tags:pendingTags,
    websiteEnabled:chk('f_websiteEnabled'),amazonEnabled:chk('f_amazonEnabled'),walmartEnabled:chk('f_walmartEnabled'),tiktokEnabled:chk('f_tiktokEnabled'),
    localDeliveryEnabled:chk('f_localDeliveryEnabled'),nationwideShippingEnabled:chk('f_nationwideShippingEnabled'),
    lastUpdated:now()};
  let savedId;
  if(editId){const p=state.products.find(x=>x.id===editId);const old=p.qty;Object.assign(p,data);savedId=p.id;
    if(data.qty!==old)logEvent(p.id,'Inventory correction',data.qty-old,'Edited via product form');toast('Product updated')}
  else{const p={id:uid('p'),dateAdded:now(),lastSale:null,lastRestock:now(),source:'Manual',...data};state.products.push(p);savedId=p.id;
    logEvent(p.id,'Stock increase',p.qty,'Initial stock');toast('Product added')}
  pendingTags=[];save();closeModal();render();
  if(data.websiteEnabled&&settings&&settings.wooAutoSync){doPush().then(()=>maybeAutoPublish(savedId))}
}

function applyStock(id){
  const p=state.products.find(x=>x.id===id);const type=val('adj_type');const n=Number(val('adj_qty')||0);const note=val('adj_note');
  let change=0;
  if(type==='Stock increase'){change=n;p.qty+=n;p.lastRestock=now()}
  else if(type==='Stock decrease'){change=-n;p.qty=Math.max(0,p.qty-n);p.lastSale=now()}
  else if(type==='Product transfer'){change=-n;p.qty=Math.max(0,p.qty-n)}
  else if(type==='Inventory correction'){change=n-p.qty;p.qty=n}
  p.lastUpdated=now();logEvent(id,type,change,note);save();closeModal();render();toast('Stock updated')
}

let wsSel={};
function wooStatusOf(p){
  if(!p.wooId)return{label:'Not published',cls:'low'};
  const needs = p.lastUpdated && p.wooSyncedAt && p.lastUpdated>p.wooSyncedAt;
  if(needs)return{label:'Needs update',cls:'low'};
  if(p.wooStatus==='publish')return{label:'Published',cls:'in'};
  return{label:'Draft',cls:'in'};
}
function toggleWs(id,on){if(on)wsSel[id]=true;else delete wsSel[id];updateWsCount()}
function wsSelectAll(on){const list=state.products.filter(p=>p.websiteEnabled);wsSel={};if(on)list.forEach(p=>wsSel[p.id]=true);render()}
function updateWsCount(){const n=Object.keys(wsSel).length;const b=document.getElementById('wsCount');if(b)b.textContent=n?`Publish selected (${n})`:'Publish selected'}
let wsSearch='', wsFilter='flagged';
function wsList(){
  const q=wsSearch.toLowerCase().trim();
  let list=state.products;
  if(wsFilter==='flagged')list=list.filter(p=>p.websiteEnabled);
  else if(wsFilter==='notflagged')list=list.filter(p=>!p.websiteEnabled);
  else if(wsFilter==='published')list=list.filter(p=>p.wooId);
  else if(wsFilter==='unpublished')list=list.filter(p=>p.websiteEnabled&&!p.wooId);
  if(q)list=list.filter(p=>(p.name+' '+p.brand+' '+p.sku+' '+p.barcode+' '+p.category).toLowerCase().includes(q));
  return list;
}
function wsRows(){
  const configured=settings&&settings.wooConfigured;
  const list=wsList();

function importSalesCSV(){
  const f=document.getElementById('salesCsv').files[0];if(!f)return;
  const rd=new FileReader();rd.onload=e=>{
    const rows=parseCSV(e.target.result);if(rows.length<2){toast('CSV looks empty');return}
    const head=rows[0].map(h=>h.trim().toLowerCase().replace(/_/g,' '));
    const col=names=>{for(const n of names){const i=head.indexOf(n);if(i>=0)return i}return -1};
    const cB=col(['barcode','upc','upc code','upccode','scan code','ean']);
    const cS=col(['sku','item sku','internal sku','plu','item code']);
    const cQ=col(['quantity sold','qty sold','units sold','total qty','total quantity','total qty sold','qty total','total units','quantity','qty','units','sold']);
    const cN=col(['name','item','item name','description','product']);
    const cA=col(['total amount','amount','total sales','net amount','sales','revenue','total']);
    if(cQ<0||(cB<0&&cS<0&&cN<0)){toast('CSV needs a quantity column plus barcode/UPC, SKU, or Name');return}
    const dm=f.name.replace(/_/g,' ').match(/([A-Za-z]{3,9})\s+(\d{1,2})\s*,?\s*(\d{4})/);
    const dd=dm?new Date(`${dm[1]} ${dm[2]}, ${dm[3]} 12:00:00`):null;
    const ts=(dd&&!isNaN(dd.getTime()))?dd.toISOString():now();
    const dayStr=new Date(ts).toISOString().slice(0,10);
    state.events=state.events.filter(ev=>!(/\(nrs\)/i.test(ev.note||'')&&String(ev.timestamp).slice(0,10)===dayStr));
    let applied=0,unmatched=0,matchedUnits=0,matchedRev=0,allDetailRev=0,allDetailUnits=0,deptRev=0,deptUnits=0;
    for(let i=1;i<rows.length;i++){const r=rows[i];
      const bc=cB>=0?cleanCell(r[cB]):'';const sk=cS>=0?cleanCell(r[cS]):'';const nm=cN>=0?cleanCell(r[cN]):'';
      const qty=Math.round(Number(String(r[cQ]||'0').replace(/[^0-9.\-]/g,''))||0);
      if(!qty)continue;
      const amt=cA>=0?(Number(String(r[cA]||'').replace(/[^0-9.\-]/g,''))||0):0;
      if(!bc&&!sk){deptRev+=amt;deptUnits+=qty;continue;}   // department/summary total row
      allDetailRev+=amt;allDetailUnits+=qty;
      const p=(sk&&state.products.find(x=>x.sku===sk))||(bc&&state.products.find(x=>x.barcode&&x.barcode===bc))||(nm&&state.products.find(x=>x.name&&x.name.trim().toLowerCase()===nm.toLowerCase()));
      if(p){p.qty=Math.max(0,(p.qty||0)-qty);p.lastSale=ts;p.lastUpdated=now();matchedUnits+=qty;matchedRev+=amt;
        state.events.unshift({id:uid('e'),productId:p.id,type:'Stock decrease',qtyChange:-qty,rev:(cA>=0?amt:undefined),note:'POS (NRS) CSV import',timestamp:ts});applied++}
      else unmatched++;
    }
    const grand=deptRev>0?deptRev:allDetailRev; const grandUnits=deptRev>0?deptUnits:allDetailUnits;
    const remRev=+(grand-matchedRev).toFixed(2); const remUnits=Math.max(0,grandUnits-matchedUnits);
    if(remRev>0.005)state.events.unshift({id:uid('e'),productId:'',type:'Stock decrease',qtyChange:-remUnits,rev:remRev,note:'POS (NRS) CSV import — unscanned/unmatched',timestamp:ts});
    const revenue=+grand.toFixed(2);
    document.getElementById('salesCsv').value='';
    save();render();toast(`NRS sales: ${applied} line(s), ${matchedUnits+remUnits} units, $${revenue.toFixed(2)} applied${unmatched?` · ${unmatched} not matched`:''}`);
  };rd.readAsText(f)

function periodCut(period){
  const d=new Date();
  if(period==='day')return new Date(d.getFullYear(),d.getMonth(),d.getDate());
  if(period==='week')return new Date(d.getTime()-7*864e5);
  return new Date(d.getFullYear(),d.getMonth(),1);
}

function salesBreakdown(period){
  const cut=periodCut(period);
  const res={Total:{u:0,r:0},Clover:{u:0,r:0},NRS:{u:0,r:0},Web:{u:0,r:0},Other:{u:0,r:0}};
  state.events.filter(e=>e.type==='Stock decrease'&&new Date(e.timestamp)>=cut).forEach(e=>{
    const u=Math.abs(e.qtyChange);const p=state.products.find(x=>x.id===e.productId);const rev=(e.rev!=null)?e.rev:u*(p?(effPrice(p)||0):0);
    const n=e.note||'';let k='Other';if(/clover/i.test(n))k='Clover';else if(/nrs/i.test(n))k='NRS';else if(/web/i.test(n))k='Web';

function computePlan(days,cover){
  const cut=Date.now()-days*864e5;const sold={};
  state.events.forEach(e=>{if(e.type!=='Stock decrease'||!e.productId)return;if(new Date(e.timestamp).getTime()<cut)return;sold[e.productId]=(sold[e.productId]||0)+Math.abs(e.qtyChange)});
  const rows=[];
  state.products.forEach(p=>{
    const u=sold[p.id]||0;const vel=u/days;const qty=p.qty||0;const rt=p.reorderThreshold||0;
    const target=Math.ceil(vel*cover)+rt;const suggest=Math.max(0,target-qty);
    const need=suggest>0&&(vel>0||qty<=rt);
    if(!need)return;
    const daysLeft=vel>0?qty/vel:(qty>0?Infinity:0);
    rows.push({p,u,vel,daysLeft,suggest,cost:(p.costPrice||0)*suggest,urgent:(qty<=0&&vel>0)});
  });
  rows.sort((a,b)=>(b.urgent-a.urgent)||(b.vel-a.vel));
  return rows;
}

function fmtMoney(n){n=Number(n)||0;if(Math.abs(n)>=1000)return '$'+(n/1000).toFixed(Math.abs(n)>=10000?0:1)+'k';return '$'+n.toFixed(0)}
function eventChan(e){const n=e.note||'';if(/clover/i.test(n))return'Clover';if(/nrs/i.test(n))return'NRS';if(/web/i.test(n))return'Web';return'Other'}
function dayKey(ts){const d=new Date(ts);d.setHours(0,0,0,0);return d.getTime()}
function dashData(win){
  const byId={};state.products.forEach(p=>byId[p.id]=p);
  const pmap={};state.products.forEach(p=>pmap[p.id]=effPrice(p)||0);
  const today=new Date();today.setHours(0,0,0,0);
  const startCur=new Date(today);startCur.setDate(today.getDate()-(win-1));
  const startPrev=new Date(today);startPrev.setDate(today.getDate()-(2*win-1));
  const days=[];for(let i=win-1;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);days.push({d,rev:0,units:0})}
  const idx={};days.forEach((o,i)=>idx[o.d.getTime()]=i);
  let curRev=0,curU=0,prevRev=0,prevU=0,curTax=0;
  const chan={Clover:{r:0,u:0},NRS:{r:0,u:0},Web:{r:0,u:0},Other:{r:0,u:0}};
  const prodAgg={},catAgg={},hours=Array(24).fill(0);
  state.events.forEach(e=>{if(e.type!=='Stock decrease')return;const t=new Date(e.timestamp);const u=Math.abs(e.qtyChange);const rev=(e.rev!=null)?e.rev:u*(pmap[e.productId]||0);
    if(t>=startCur){curRev+=rev;curU+=u;curTax+=(e.tax||0);const k=dayKey(e.timestamp);if(idx[k]!=null){days[idx[k]].rev+=rev;days[idx[k]].units+=u}
      hours[t.getHours()]+=rev;
      const c=eventChan(e);chan[c].r+=rev;chan[c].u+=u;
      const p=byId[e.productId];if(p){const a=prodAgg[p.id]||(prodAgg[p.id]={name:p.name,u:0,r:0});a.u+=u;a.r+=rev;const cat=p.category||'Other';catAgg[cat]=(catAgg[cat]||0)+rev}
    } else if(t>=startPrev){prevRev+=rev;prevU+=u}
  });
  const peakDay=days.reduce((m,d)=>d.rev>m.rev?d:m,{rev:-1,d:today});
  return {days,curRev,curU,prevRev,prevU,curTax,chan,hours,peakDay,
    topSellers:Object.values(prodAgg).sort((a,b)=>b.r-a.r).slice(0,8),
    catSales:Object.entries(catAgg).sort((a,b)=>b[1]-a[1]).slice(0,8)};
}
function deltaBadge(cur,prev){

  return `<span style="color:${up?'var(--green)':'var(--red)'};font-size:12px;font-weight:700">${up?'▲':'▼'} ${Math.abs(d).toFixed(0)}%</span>`;
}
function svgArea(days){
  const W=760,H=170,pad=30;const max=Math.max(1,...days.map(d=>d.rev));const n=days.length;
  const X=i=>pad+(W-2*pad)*(n<=1?0.5:i/(n-1));const Y=v=>H-pad-(H-2*pad)*(v/max);
  const pts=days.map((d,i)=>[X(i),Y(d.rev)]);

function svgSpark(vals,color){
  const W=200,H=34,n=vals.length,max=Math.max(1,...vals);
  const X=i=>(n<=1?W:i/(n-1)*W),Y=v=>H-2-(v/max)*(H-5);
  const line=vals.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  const area=`M0 ${H} `+vals.map((v,i)=>'L'+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ')+` L${W} ${H} Z`;
  const id='sp'+color.replace('#','');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="opacity:.5"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".35"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#${id})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2"/></svg>`;
}
function svgDonut(segs){
  const total=segs.reduce((a,s)=>a+s.value,0)||1;const R=54,r=33,C=70;let a0=-Math.PI/2;
  const arcs=segs.filter(s=>s.value>0).map(s=>{const frac=s.value/total,a1=a0+frac*2*Math.PI;
    const x0=C+R*Math.cos(a0),y0=C+R*Math.sin(a0),x1=C+R*Math.cos(a1),y1=C+R*Math.sin(a1);
    const xr0=C+r*Math.cos(a1),yr0=C+r*Math.sin(a1),xr1=C+r*Math.cos(a0),yr1=C+r*Math.sin(a0);
    const lg=frac>0.5?1:0;a0=a1;
    return `<path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${R} ${R} 0 ${lg} 1 ${x1.toFixed(1)} ${y1.toFixed(1)} L${xr0.toFixed(1)} ${yr0.toFixed(1)} A${r} ${r} 0 ${lg} 0 ${xr1.toFixed(1)} ${yr1.toFixed(1)} Z" fill="${s.color}"/>`}).join('');
  return `<svg viewBox="0 0 140 140" style="width:132px;height:132px;flex:none">${arcs}</svg>`;
}

function applyPromo(id){
  const p=state.products.find(x=>x.id===id);if(!p)return;
  if(p.retailPrice==null){toast('Set a retail price first');return}
  const v=prompt(`Discount % off retail for "${p.name}" (retail $${p.retailPrice}):`,'20');
  if(v==null)return;const pct=Number(v);if(!pct||pct<=0||pct>=100){toast('Enter a % between 1 and 99');return}
  p.salePrice=Math.round(p.retailPrice*(1-pct/100)*100)/100;p.lastUpdated=now();save();render();
  toast(`${pct}% off — sale price $${p.salePrice}. Publish to website to push it live.`);
}

let catFilter='', catSearch='';
function suggestCategory(p){
  const hay=(' '+(p.name||'')+' '+(p.brand||'')+' '+(p.category||'')+' '+(p.subcategory||'')+' ').toLowerCase();
  for(const r of CATEGORY_RULES){
    if(r.not && r.not.some(t=>hay.includes(t))) continue;
    if(r.any.some(t=>hay.includes(t))) return r.name;
  }
  for(const cat of Object.keys(BRAND_CATEGORY)){
    if(BRAND_CATEGORY[cat].some(b=>hay.includes(b))) return cat;
  }
  return '';
}
function catList(){
  let list=state.products||[];
  if(catFilter==='uncat') list=list.filter(p=>!p.publicCategory);
  else if(catFilter) list=list.filter(p=>p.publicCategory===catFilter);
  const s=catSearch.trim().toLowerCase();
  if(s) list=list.filter(p=>((p.name||'')+' '+(p.brand||'')).toLowerCase().includes(s));
  return list;
}

function catRows(){
  const all=catList(); const list=all.slice(0,300);

function autoCategorize(overwrite){
  if(overwrite && !confirm('Re-run rules on every unlocked product? This overwrites categories you set manually unless the row is locked.'))return;
  const prods=state.products||[]; let n=0;
  prods.forEach(p=>{
    if(p.catLocked) return;
    if(!overwrite && p.publicCategory) return;
    const sug=suggestCategory(p);
    if(sug && p.publicCategory!==sug){ p.publicCategory=sug; n++; }
  });
  save(); render(); toast(`Auto-filled ${n} product(s). Review, then it syncs to the website.`);
}
function bulkAssign(cat){
  const list=catList();
  if(!list.length){ toast('No products in the current view.'); return; }
  if(!confirm(`Set ${list.length} product(s) currently shown to "${cat}"? Locked rows are skipped.`))return;
  let n=0; list.forEach(p=>{ if(p.catLocked)return; if(p.publicCategory!==cat){ p.publicCategory=cat; p.lastUpdated=now(); n++; } });
  save(); render(); toast(`Set ${n} product(s) to ${cat}.`);
}

function saveCustomer(id){

  const d={name,phone:val('c_phone'),email:val('c_email'),points:Number(val('c_points')||0),tags,optIn:chk('c_optin')};
  if(id){Object.assign((state.customers||[]).find(x=>x.id===id),d)}
  else{state.customers=state.customers||[];state.customers.unshift({id:uid('c'),source:'Manual',createdAt:now(),lastContact:null,lastVisit:null,totalSpent:0,...d})}

function recordPurchase(id){const c=(state.customers||[]).find(x=>x.id===id);const amt=Number(val('c_spend')||0);if(!amt){toast('Enter a purchase amount');return}
  const per=(settings&&settings.loyaltyPerDollar)||1;const add=Math.round(amt*per);c.points=(c.points||0)+add;c.totalSpent=(c.totalSpent||0)+amt;c.lastVisit=now();save();openCustomer(id);toast(`+${add} points (now ${c.points})`)}
function importCustomersCSV(){
  const f=document.getElementById('custCsv').files[0];if(!f)return;
  const rd=new FileReader();rd.onload=e=>{const rows=parseCSV(e.target.result);if(rows.length<2){toast('CSV empty');return}
    const head=rows[0].map(h=>cleanCell(h).toLowerCase());const col=n=>{for(const x of n){const i=head.indexOf(x);if(i>=0)return i}return -1};
    const cN=col(['name','customer','full name']),cP=col(['phone','mobile','cell','phone number']),cE=col(['email','e-mail']),cPt=col(['points']);
    if(cN<0&&cP<0&&cE<0){toast('CSV needs name, phone, or email columns');return}
    state.customers=state.customers||[];let added=0;
    for(let i=1;i<rows.length;i++){const r=rows[i];const name=cN>=0?cleanCell(r[cN]):'';const phone=cP>=0?cleanCell(r[cP]):'';const email=cE>=0?cleanCell(r[cE]):'';
      if(!name&&!phone&&!email)continue;
      const ex=state.customers.find(x=>(phone&&x.phone===phone)||(email&&x.email&&x.email.toLowerCase()===email.toLowerCase()));
      if(ex){if(phone)ex.phone=phone;if(email)ex.email=email;if(name&&!ex.name)ex.name=name;continue}
      state.customers.push({id:uid('c'),name:name||'Customer',phone,email,points:cPt>=0?Number(cleanCell(r[cPt])||0):0,tags:[],optIn:true,source:'Import',createdAt:now(),lastContact:null,lastVisit:null,totalSpent:0});added++}
    document.getElementById('custCsv').value='';save();render();toast(added+' customers imported')
  };rd.readAsText(f)
}

/* ===================== UNIFIED FULFILLMENT QUEUE (Orders & Pickups) ===================== */
let opsList=[]; let opsLocal={}; let opsFilter='all';
function timeAgo(iso){ if(!iso)return''; const d=new Date(iso), s=Math.floor((Date.now()-d.getTime())/1000); if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+' min ago'; if(s<86400)return Math.floor(s/3600)+' hr ago'; return d.toLocaleDateString(); }
function opsKey(o){ return o.type+':'+String(o.code).toUpperCase(); }
function opsStage(o){
  const s=o.status;
  if(s==='READY')return'ready';
  if(s==='FULFILLED'||s==='PICKED_UP')return'done';
  if(s==='CANCELLED'||s==='EXPIRED')return'cancelled';
  const l=opsLocal[opsKey(o)];
  if(l&&l.stage==='preparing')return'preparing';
  if(l&&l.stage==='accepted')return'accepted';
  return'new';
}
const OPS_STAGE_META={ new:['low','New','Customer waiting'], accepted:['low','Accepted','Go collect the item'], preparing:['low','Preparing','Collecting the item'], ready:['in','Ready','Customer notified'], done:['','Completed','Picked up'], cancelled:['out','Cancelled',''] };
function opsKpi(){
  const list=opsList||[]; const today=iso=>{try{return new Date(iso).toDateString()===new Date().toDateString();}catch(e){return false;}};
  let nw=0,prep=0,ready=0,done=0;
  list.forEach(o=>{const st=opsStage(o); if(st==='new'&&today(o.createdAt))nw++; if(st==='accepted'||st==='preparing')prep++; if(st==='ready')ready++; if(st==='done')done++;});
  const box=(n,l,c)=>`<div class="stat"><div class="n" style="color:${c}">${n}</div><div class="l">${l}</div></div>`;
  return `<div class="stat-row">${box(nw,'New today','#B07508')}${box(prep,'Preparing','#123B8F')}${box(ready,'Ready','#1E8A3C')}${box(done,'Completed','#5A6B84')}</div>`;
}
function viewOps(){
  const s=settings||{};
  const open=(opsList||[]).filter(o=>!['done','cancelled'].includes(opsStage(o)));
  const chip=(v,l,n)=>`<button class="btn ${opsFilter===v?'':'sec'} sm" onclick="opsSetFilter('${v}')">${l}${n!=null?` (${n})`:''}</button>`;
  return `<h2 class="view-title">Orders &amp; Pickups ${s.platformConfigured?'':'<span class="mini">Set the platform secret in Settings</span>'}</h2>
  ${opsKpi()}
  <div class="toolbar" style="margin-top:8px">
    <button class="btn" onclick="pullFulfillment()" ${s.platformConfigured?'':'disabled'}>⟳ Refresh</button>
    <span class="sub" style="margin-left:6px">${open.length} open · auto-refreshes every 2 min</span>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px">
    ${chip('all','All',(opsList||[]).length)}${chip('new','New')}${chip('ready','Ready')}
    <span style="width:8px"></span>
    ${chip('reservation','Reservations')}${chip('order','Orders')}${chip('repair','Repairs')}${chip('service','Services')}
  </div>
  <div id="opsBody">${opsRows()}</div>`;
}
function opsStatusBadge(s){
  const m={PENDING:['low','New'],BOOKED:['low','New'],NEW:['low','New'],CONFIRMED:['low','Confirmed'],DIAGNOSING:['low','Diagnosing'],AWAITING_APPROVAL:['low','Awaiting approval'],IN_PROGRESS:['low','In progress'],READY:['in','Ready'],FULFILLED:['','Picked up'],PICKED_UP:['','Picked up'],CANCELLED:['out','Cancelled'],EXPIRED:['out','Expired']};
  const x=m[s]||['',String(s||'')];
  return `<span class="badge ${x[0]}">${x[1]}</span>`;
}
function opsActions(o){
  const st=opsStage(o), A=[]; const pickup=o.type==='repair'?'PICKED_UP':'FULFILLED';
  if(st==='new'){ A.push(['Accept','ACCEPTED',false,true]); A.push(['Cancel','CANCELLED',false,false]); }
  else if(st==='accepted'){ A.push(['Start preparing','PREPARING',false,true]); A.push(['Ready & notify','READY',true,false]); A.push(['Cancel','CANCELLED',false,false]); }
  else if(st==='preparing'){ A.push(['Ready & notify','READY',true,true]); A.push(['Cancel','CANCELLED',false,false]); }
  else if(st==='ready'){ A.push(['Picked up',pickup,false,true]); A.push(['Re-notify','READY',true,false]); }
  return A;
}
function opsCard(o){
  const typeLabel={reservation:'Reservation',order:'Order',repair:'Repair',service:'Service'}[o.type]||o.type;
  const st=opsStage(o), m=OPS_STAGE_META[st]||['','',''];
  const l=opsLocal[opsKey(o)]||{};
  const barColor=st==='ready'?'#1E8A3C':st==='new'?'#F5A623':st==='cancelled'?'#c0453e':st==='done'?'#8a94a6':'#123B8F';
  const acts=opsActions(o).map(a=>`<button class="btn ${a[3]?'':'sec'}" onclick="opsAct('${o.type}','${esc(o.code)}','${a[1]}',${a[2]?'true':'false'})">${a[0]}</button>`).join(' ');
  const loclines=(o.lines&&o.lines.length)?o.lines.map(li=>{
    const where=[li.aisle&&('Aisle '+li.aisle),li.shelf&&('Shelf '+li.shelf),li.bin&&('Bin '+li.bin)].filter(Boolean).join(' · ');
    return `<div style="padding:4px 0;border-top:1px solid var(--line)"><div style="font-weight:600;font-size:13px">${li.qty}× ${esc(li.name)}</div>${where?`<div style="font-size:12px;color:#0a2540;font-weight:600">📍 ${esc(where)}</div>`:''}</div>`;
  }).join(''):'';
  const callIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
  const smsIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  const contact=o.phone?`<div class="cta-row"><a class="cta cta-call" href="tel:${esc(o.phone)}">${callIcon}Call</a><a class="cta cta-sms" href="sms:${esc(o.phone)}">${smsIcon}Text</a></div>`:'';
  const notif=l.notifiedAt?`<div style="font-size:11.5px;margin-top:8px;color:#146a2c;font-weight:600">✓ Notified ${timeAgo(l.notifiedAt)} · ${esc((l.notifiedVia||'').toUpperCase())}</div>`:'';
  return `<div class="card pad" style="border-left:4px solid ${barColor}">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
      <span class="badge ${m[0]}">${m[1]}</span>
      <span class="sub" style="font-size:11.5px" title="${new Date(o.createdAt).toLocaleString()}">${timeAgo(o.createdAt)}</span>
    </div>
    <div style="font-size:12px;color:#5A6B84;margin-top:3px">${esc(typeLabel)}${m[2]?' · '+esc(m[2]):''}${o.paid?` <span class="mini" style="background:#dcfce7;color:#166534">PAID${o.amountPaid!=null?' $'+Number(o.amountPaid).toFixed(2):''}</span>`:((o.fulfillment&&o.fulfillment!=='PICKUP')?' <span class="mini" style="background:#fef3c7;color:#92400e">unpaid</span>':'')}</div>
    <div style="font-weight:800;margin-top:6px;font-size:15px">${esc(o.code)}</div>
    <div style="font-size:13px">${esc(o.name||'—')}${(o.loyaltyTier&&o.loyaltyTier!=='MEMBER')?` <span class="mini" style="background:#fef3c7;color:#92400e">★ ${esc(o.loyaltyTier)}</span>`:''}${o.phone?' · '+esc(o.phone):''}</div>
    ${contact}
    ${o.phone?`<button class="btn sec" style="width:100%;margin-top:6px;font-size:12.5px" onclick="openProfile({phone:'${esc(o.phone)}'})">View full profile ›</button>`:''}
    ${loclines?`<div style="margin-top:8px">${loclines}</div>`:(o.summary?`<div class="sub" style="font-size:12.5px;margin-top:8px">${esc(o.summary)}</div>`:'')}
    ${o.total!=null?`<div style="font-weight:700;margin-top:6px">$${Number(o.total).toFixed(2)}</div>`:''}
    ${Number(o.discount)>0?`<div class="mini" style="background:#fef9c3;color:#854d0e;margin-top:4px;display:inline-block;padding:3px 7px;border-radius:6px;font-weight:700">Apply $${Number(o.discount).toFixed(2)} discount${o.couponCode?' ('+esc(o.couponCode)+')':''} at register</div>`:''}
    ${o.fulfillment&&o.fulfillment!=='PICKUP'?`<div class="sub" style="font-size:12px;margin-top:4px">${esc(String(o.fulfillment).replace('_',' ').toLowerCase())}${o.address?': '+esc(o.address):''}</div>`:''}
    ${o.pickupSlot?`<div class="mini" style="background:#e0e7ff;color:#3730a3;margin-top:4px;display:inline-block;padding:3px 7px;border-radius:6px;font-weight:700">🕑 Pickup: ${esc(o.pickupSlot)}</div>`:''}
    ${notif}
    ${acts?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">${acts}</div>`:(st==='done'?`<div class="sub" style="font-size:12px;margin-top:8px">Completed${l.completedAt?' '+timeAgo(l.completedAt):''}</div>`:(o.type==='service'?'<div class="sub" style="font-size:12px;margin-top:8px">Contact the customer to follow up.</div>':''))}
  </div>`;
}
function opsRows(){
  let list=opsList||[];
  if(opsFilter==='new') list=list.filter(o=>opsStage(o)==='new');
  else if(opsFilter==='ready') list=list.filter(o=>opsStage(o)==='ready');
  else if(['reservation','order','repair','service'].includes(opsFilter)) list=list.filter(o=>o.type===opsFilter);
  if(!list.length) return '<div class="empty">Nothing here yet. Click Refresh to pull the latest from the website.</div>';
  const ord={new:0,accepted:1,preparing:2,ready:3,done:5,cancelled:6};
  list=[...list].sort((a,b)=>(ord[opsStage(a)]-ord[opsStage(b)]));
  return `<div style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">${list.map(opsCard).join('')}</div>`;
}
function opsSetFilter(v){opsFilter=v;render()}
async function loadFulfillment(){
  const s=settings||{};
  if(s.platformConfigured){ await pullFulfillment(); return; }
  try{ await loadState(); opsList=state.fulfillment||[]; opsLocal=state.fulfillmentLocal||{}; if(view==='ops')render(); }catch(e){}
}
async function pullFulfillment(){ toast('Refreshing orders…');
  try{ const r=await fetch('/api/fulfillment/pull',{method:'POST'}); const d=await r.json(); if(d.error)throw new Error(d.error);
    await loadState(); opsList=state.fulfillment||[]; opsLocal=state.fulfillmentLocal||{}; if(view==='ops')render(); toast(`${d.count} item(s)`); }
  catch(e){ toast('Refresh failed: '+e.message); try{await loadState();opsList=state.fulfillment||[];opsLocal=state.fulfillmentLocal||{};if(view==='ops')render();}catch(_){} }
}
async function opsAct(type,code,status,notify){
  if(status==='CANCELLED' && !confirm('Cancel this order? The customer will see it as cancelled.'))return;
  toast('Updating…');
  try{ const r=await fetch('/api/fulfillment/act',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({type,code,status,notify})}); const d=await r.json(); if(d.error)throw new Error(d.error);
    await loadState(); opsList=state.fulfillment||[]; opsLocal=state.fulfillmentLocal||{}; render();
    if(status==='READY'&&notify) toast(d.via?('Marked ready · notified by '+d.via):'Marked ready · add Twilio/SendGrid to text the customer');
    else if(status==='ACCEPTED') toast('Accepted');
    else if(status==='PREPARING') toast('Preparing');
    else toast('Updated'); }
  catch(e){ toast('Update failed: '+e.message); } }

      onclick="showFlagged('${f}')"><span>${FLAG_LABELS[f]}</span><b>${n.toLocaleString()}</b></button>`;
  }).join('');
  namePanelEl().innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <b>Catalog health</b>
      <button class="btn sec" style="padding:2px 8px" onclick="closeNamingPanel()">✕</button>
    </div>
    <div style="background:#eaf7ee;border-radius:10px;padding:12px;margin-bottom:6px">
      <div style="font-size:26px;font-weight:700;line-height:1">${s.published.toLocaleString()}</div>

    </div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:4px 10px;margin-bottom:12px">
      <span>✨ Fully enriched (no flags)</span><b>${s.fullyEnriched.toLocaleString()}</b>

    </div>
    <div style="font-weight:600;margin-bottom:6px">Issues — click to filter</div>
    ${rows}
    <label style="display:flex;gap:8px;align-items:center;margin:12px 0 8px">
      <input type="checkbox" id="autoNamingChk" ${s.autoNaming?'checked':''} onchange="saveNaming()">

    <label style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <span>Flag name as weak below</span>
      <input type="number" id="minScoreInp" min="0" max="100" value="${s.weakNameBelow}" style="width:64px" onchange="saveNaming()">

}

  el.innerHTML = `
    <div style="margin-top:12px;border-top:1px solid #e6ebf2;padding-top:10px">

    </div>`;
}

let polishRunning=false;
async function polishNames(){
  if(polishRunning){polishRunning=false;toast('Stopping after this batch…');return}
  if(!confirm('Use AI to clean up messy product names for the website (writes a display name; your register names stay untouched)? Runs in batches, in-stock first. Uses your AI credits — you can stop anytime.'))return;
  polishRunning=true;
  const btn=document.getElementById('polishBtn');if(btn)btn.textContent='■ Stop cleaning';
  let ai=0,rule=0;
  try{
    while(polishRunning){
      const r=await fetch('/api/catalog/polish-names',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({limit:60})});
      const d=await r.json();if(d.error)throw new Error(d.error);
      ai+=d.ai||0; rule+=d.rule||0;
      toast(`✨ Cleaned ${ai+rule} names${ai?` (${ai} by AI)`:''}${d.remaining?` · ${d.remaining} to go`:''}`);
      if(!d.remaining || !d.processed) break;
    }
    await loadState();render();
    toast(`✨ Done. ${ai+rule} product names cleaned. Run platform-sync to push them to the website.`);
  }catch(e){toast('Name cleanup failed: '+e.message)}
  polishRunning=false;const b2=document.getElementById('polishBtn');if(b2)b2.textContent='✨ AI clean names';
}

  const to=val('mk_test');if(!to){toast('Enter a test '+(mkChan==='sms'?'phone':'email'));return}
  const message=val('mk_message');if(!message){toast('Write a message first');return}
  toast('Sending test…');
  try{const r=await fetch('/api/marketing/test',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({channel:mkChan,to:{name:'Test',[mkChan==='sms'?'phone':'email']:to},subject:val('mk_subject'),message})});const d=await r.json();
    toast(d.ok?'✅ Test sent':'❌ '+(d.error||'failed'))}
  catch(e){toast('Test failed: '+e.message)}}
async function mkSend(){
  const message=val('mk_message');if(!message){toast('Write a message first');return}
  const recips=mkRecipients();if(!recips.length){toast('No recipients in this audience/channel');return}
  if(!confirm(`Send this ${mkChan.toUpperCase()} to ${recips.length} customer(s)? This will use your ${mkChan==='sms'?'Twilio':'SendGrid'} account.`))return;
  toast(`Sending to ${recips.length}…`);
  try{const r=await fetch('/api/marketing/send',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({channel:mkChan,subject:val('mk_subject'),message,recipients:recips.map(c=>({name:c.name,phone:c.phone,email:c.email}))})});
    const d=await r.json();if(d.error)throw new Error(d.error);
    const ids=new Set(recips.map(c=>c.id));(state.customers||[]).forEach(c=>{if(ids.has(c.id))c.lastContact=now()});save();render();
    toast(`Sent ${d.sent}${d.failed?` · ${d.failed} failed`:''}${d.skipped?` · ${d.skipped} skipped`:''}${d.errors&&d.errors.length?' — '+esc(d.errors[0]):''}`)}
  catch(e){toast('Send failed: '+e.message)}}
async function notifyRequest(id){
  const r=(state.requests||[]).find(x=>x.id===id);if(!r)return;
  const chan=r.phone?'sms':(r.email?'email':null);if(!chan){toast('This request has no phone or email');return}
  const message=`Hi${r.name?' '+r.name.split(' ')[0]:''}! Good news — the item you requested ("${r.name}") is now available at Family Bazar. Come grab it!`;
  if(!confirm(`Notify this customer by ${chan.toUpperCase()} that their item is in?`))return;
  toast('Sending…');
  try{const rr=await fetch('/api/marketing/test',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({channel:chan,to:{name:r.name,phone:r.phone,email:r.email},subject:'Your Family Bazar request is in!',message})});const d=await rr.json();
    toast(d.ok?'✅ Customer notified':'❌ '+(d.error||'failed'))}
  catch(e){toast('Notify failed: '+e.message)}}

async function saveKeys(which){
  const b={};
  if(which==='ai'){
    if(val('set_upc'))b.upcApiKey=val('set_upc');
    b.aiProvider=val('set_aiProvider');if(val('set_aiModel'))b.aiModel=val('set_aiModel');
    if(val('set_ai'))b.aiApiKey=val('set_ai');
  }else if(which==='clover'){
    if(val('set_cmid'))b.cloverMerchantId=val('set_cmid');
    if(val('set_ctok'))b.cloverApiToken=val('set_ctok');
    b.cloverBase=val('set_cbase');
  }else if(which==='woo'){
    if(val('set_wurl'))b.wooUrl=val('set_wurl');
    if(val('set_wkey'))b.wooKey=val('set_wkey');
    if(val('set_wsec'))b.wooSecret=val('set_wsec');
  }else if(which==='platform'){
    if(val('set_purl'))b.platformUrl=val('set_purl');
    if(val('set_psec'))b.platformSecret=val('set_psec');
  }else{
    if(val('set_tsid'))b.twilioSid=val('set_tsid');
    if(val('set_ttok'))b.twilioToken=val('set_ttok');
    if(val('set_tfrom'))b.twilioFrom=val('set_tfrom');
    if(val('set_sg'))b.sendgridKey=val('set_sg');
    if(val('set_femail'))b.fromEmail=val('set_femail');
    if(val('set_fname'))b.fromName=val('set_fname');
  }
  try{await fetch('/api/settings',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(b)});await loadSettings();toast('Settings saved ✅')}
  catch(e){toast('Could not save settings')}
}
async function syncClover(){
  toast('Importing Clover catalog…');
  try{const r=await fetch('/api/clover/import',{method:'POST'});const d=await r.json();
    if(d.error)throw new Error(d.error);
    await loadState();render();toast(`Clover: ${d.imported} added, ${d.updated} updated`)}
  catch(e){toast('Clover import failed: '+e.message)}

async function importNrsProducts(){
  const inp=document.getElementById('nrsCat'); if(!inp||!inp.files.length)return;
  const file=inp.files[0]; const filename=file.name; inp.value='';
  toast('Reading NRS report…');
  try{
    const csv=await file.text();
    const r=await fetch('/api/nrs/products/import',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({csv,filename})});
    const d=await r.json();
    if(d.error){ toast(d.error); return; }
    await loadState();render();
    if(d.inventory) toast(`NRS inventory: ${d.setq||0} counts set, ${d.added||0} new`);
    else toast(`NRS sales: ${d.applied||0} applied${d.unmatched?`, ${d.unmatched} unmatched`:''}`);
  }catch(e){ toast('NRS import failed: '+e.message); }
}
function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++}else q=false}else cur+=c}
    else{if(c==='"')q=true;else if(c===','){row.push(cur);cur=''}else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;row.push(cur);rows.push(row);row=[];cur=''}else cur+=c}}
  if(cur!==''||row.length){row.push(cur);rows.push(row)}
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}
// Strip NRS/Excel text wrappers like  ="202101000006"  ->  202101000006
function cleanCell(v){ v=(v==null?'':String(v)).trim(); const m=v.match(/^="?(.*?)"?$/); return m?m[1].trim():v; }
function importCSV(){
  const f=document.getElementById('csvFile').files[0];if(!f){toast('Choose a CSV first');return}
  const src=(document.getElementById('csvSource')||{}).value||'Other';
  const rd=new FileReader();rd.onload=e=>{
    const rows=parseCSV(e.target.result);if(rows.length<2){toast('CSV looks empty');return}
    const head=rows[0].map(h=>cleanCell(h).toLowerCase());
    const col=names=>{for(const n of names){const i=head.indexOf(n);if(i>=0)return i}return -1};
    const C={
      name: col(['name','item name','itemname','description','product','product name','item','item description']),
      upc:  col(['upc','barcode','upc code','ean','scan code','unit_upc','upccode']),
      sku:  col(['sku','plu','item code','item #','item number','itemnumber']),
      brand:col(['brand','manufacturer']),
      cat:  col(['category']),
      sub:  col(['subcategory','size']),
      costDollars: col(['cost','cost price','unit cost','costprice']),
      costCents:   col(['cost_cents','costcents']),
      retailDollars: col(['retail price','retail','price','sell price','unit price','list price','retailprice']),
      cents: col(['cents']),
      sale:  col(['sale price','saleprice','promo price']),
      stock: col(['setstock','quantity on hand','qty on hand','on hand','onhand','stock on hand','stock','in stock']),
      qtyAlt:col(['qty','quantity','units']),
      reorder: col(['reorder','reorder threshold','reorder point','min qty','min']),
      aisle: col(['aisle']), shelf: col(['shelf']), bin: col(['bin']),
      supplier: col(['supplier','vendor'])
    };
    if(C.name<0){toast('No product-name column found. Headers seen: '+head.slice(0,10).join(', '));return}
    let added=0,updated=0,skipped=0;
    for(let i=1;i<rows.length;i++){const r=rows[i];
      const g=ix=>ix>=0?cleanCell(r[ix]):'';
      const numAt=ix=>{const v=g(ix);if(v==='')return null;const n=Number(v.replace(/[^0-9.\-]/g,''));return isFinite(n)?n:null};
      const name=g(C.name);if(!name){skipped++;continue}
      const barcode=g(C.upc), sku=g(C.sku);
      let retail = (C.cents>=0 && g(C.cents)!=='') ? numAt(C.cents)/100 : numAt(C.retailDollars);
      let cost   = (C.costCents>=0 && g(C.costCents)!=='') ? numAt(C.costCents)/100 : numAt(C.costDollars);
      let sale   = numAt(C.sale);
      let qty    = (C.stock>=0 && g(C.stock)!=='') ? numAt(C.stock) : numAt(C.qtyAlt);
      qty = (qty!=null && isFinite(qty)) ? qty : 0;
      const brand=g(C.brand), cat=g(C.cat)||'Other', sub=g(C.sub), supplier=g(C.supplier);
      const reorder=(C.reorder>=0 && g(C.reorder)!=='')?Number(numAt(C.reorder)):5;
      let p=(sku&&state.products.find(x=>x.sku===sku))||(barcode&&state.products.find(x=>x.barcode&&x.barcode===barcode));
      if(p){
        p.name=name;
        if(brand)p.brand=brand; if(cat&&cat!=='Other')p.category=cat; if(sub)p.subcategory=sub;
        if(cost!=null)p.costPrice=cost; if(retail!=null)p.retailPrice=retail; if(sale!=null)p.salePrice=sale;
        if(qty!=null)p.qty=qty; if(supplier)p.supplier=supplier; if(barcode&&!p.barcode)p.barcode=barcode;
        if(p.source!=='Clover')p.source=src;     // Clover (live register) stays authoritative
        p.lastUpdated=now(); updated++;
      } else {
        state.products.push({id:uid('p'),sku:sku||barcode||uid('SKU').toUpperCase(),barcode,name,brand,
          category:cat,subcategory:sub,description:'',image:'',
          costPrice:cost,retailPrice:retail,salePrice:sale,
          qty,reorderThreshold:reorder,overstockThreshold:50,
          aisle:g(C.aisle),shelf:g(C.shelf),bin:g(C.bin),supplier,tags:[],source:src,
          websiteEnabled:false,amazonEnabled:false,walmartEnabled:false,tiktokEnabled:false,
          dateAdded:now(),lastUpdated:now(),status:'Active',lastSale:null,lastRestock:now()});added++}
    }
    save();render();toast(`${added} added, ${updated} updated as ${src}${skipped?` · ${skipped} skipped`:''} ✅`)
  };rd.readAsText(f)
}
function downloadTemplate(){
  const cols=['sku','barcode','name','brand','category','subcategory','description','costPrice','retailPrice','salePrice','qty','reorderThreshold','aisle','shelf','bin','supplier'];
  const sample=cols.join(',')+'\nFB-2001,012345678999,Example Product,BrandX,Grocery,Canned,Tasty beans,0.80,1.99,,24,6,A,2,1,US Foods';
  dl(new Blob([sample],{type:'text/csv'}),'familybazar-import-template.csv')
}
function exportJSON(){dl(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),'familybazar-ros-backup.json');toast('Backup downloaded')}
function importJSON(){
  const f=document.getElementById('jsonFile').files[0];if(!f){toast('Choose a file first');return}
  const rd=new FileReader();rd.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.products)throw 0;state=d;save();render();toast('Backup restored')}catch(x){toast('Invalid backup file')}};rd.readAsText(f)
}
function clearAll(){if(!confirm('Remove ALL products? (Requests and history are kept.)'))return;state.products=[];state.events=[];save();render();toast('All products cleared')}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()}

/* ---------- modal ---------- */
function showModal(){modalOpen=true;document.getElementById('modalBg').classList.add('show')}
function closeModal(){modalOpen=false;document.getElementById('modalBg').classList.remove('show')}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal()});

/* ---------- live sync polling ---------- */
function startPolling(){
  setInterval(async ()=>{
    if(modalOpen||view==='kiosk'||view==='settings')return;
    if(view==='analytics'&&dashTab==='ai')return;
    const ae=document.activeElement;if(ae&&/INPUT|TEXTAREA|SELECT/.test(ae.tagName))return;
    try{const r=await fetch('/api/state');state=await r.json();setConn(true);render()}catch(e){setConn(false)}
  },7000);
}

/* ---------- boot ---------- */
(async()=>{
  try{await loadState();await loadSettings();}catch(e){setConn(false)}
  render();startPolling();
})();
</script>
